# Nginx config for Ichebo Media Video Engine
# Include this in the main server block for the media subdomain or path.
# Example: include /etc/nginx/conf.d/nginx-media.conf;

# Proxy /engine/ to the Go mediad service
location /engine/ {
    proxy_pass         http://127.0.0.1:8090;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Large uploads — disable buffering so chunks stream directly to mediad
    proxy_request_buffering off;
    client_max_body_size    512M;
    proxy_read_timeout      300s;
    proxy_send_timeout      300s;
}

# Health check endpoint
location /health {
    proxy_pass http://127.0.0.1:8090/health;
}
