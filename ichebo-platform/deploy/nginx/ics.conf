# ============================================================
# sceptre.ichebo.org — Sceptre Community surface (H.6, ADR-023)
# Port 80 only for now — certbot --nginx will add the redirect to
# 443 and the matching ssl server block once the cert is issued.
# ============================================================
server {
    server_name sceptre.ichebo.org;

    location /static/ {
        alias /home/scepter/ichebo-platform-repo/ichebo-platform/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass http://localhost:9000/ics-media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sceptre.ichebo.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sceptre.ichebo.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = sceptre.ichebo.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name sceptre.ichebo.org;
    return 404; # managed by Certbot


}