# ============================================================
# ichebo.org — Marketing Site (static files)
# ============================================================
server {
    listen 80;
    server_name ichebo.org www.ichebo.org;

    location / {
        return 301 https://ichebo.org$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.ichebo.org;

    ssl_certificate /etc/letsencrypt/live/ichebo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ichebo.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ichebo.org$request_uri;
}

server {
    listen 443 ssl;
    server_name ichebo.org;

    ssl_certificate /etc/letsencrypt/live/ichebo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ichebo.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/scepter/ichebo-site;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================================
# app.ichebo.org — Django Platform
# ============================================================
server {
    listen 80;
    server_name app.ichebo.org;

    location / {
        return 301 https://app.ichebo.org$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name app.ichebo.org;

    ssl_certificate /etc/letsencrypt/live/app.ichebo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.ichebo.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /static/ {
        alias /home/scepter/ichebo-platform-repo/ichebo-platform/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass http://localhost:9000/ics-media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}

