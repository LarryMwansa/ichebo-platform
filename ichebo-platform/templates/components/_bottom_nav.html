<!-- components/_bottom_nav.html -->
<div class="bottom-bar" role="navigation" aria-label="Main navigation">

  <a href="{% url 'dashboard:index' %}"
     class="nav-item {% if request.resolver_match.app_name == 'dashboard' %}active{% endif %}"
     aria-label="Home">
    <span class="material-symbols-outlined nav-icon">home</span>
    <span class="nav-label">Home</span>
  </a>

  <a href="{% url 'bible:reader' %}"
     class="nav-item {% if request.resolver_match.app_name == 'bible' %}active{% endif %}"
     aria-label="Bible">
    <span class="material-symbols-outlined nav-icon">auto_stories</span>
    <span class="nav-label">Bible</span>
  </a>

  <a href="{% url 'dashboard:explore' %}"
     class="nav-item {% if request.resolver_match.url_name == 'explore' %}active{% endif %}"
     aria-label="Explore">
    <span class="material-symbols-outlined nav-icon">explore</span>
    <span class="nav-label">Explore</span>
  </a>

  {% if user_level >= 4 or request.user.is_superuser %}
  <a href="{% url 'handbook:home' %}"
     class="nav-item {% if request.resolver_match.app_name == 'handbook' %}active{% endif %}"
     aria-label="Handbook">
    <span class="material-symbols-outlined nav-icon">menu_book</span>
    <span class="nav-label">Handbook</span>
  </a>
  {% endif %}

  <a href="{% url 'dashboard:you' %}"
     class="nav-item {% if request.resolver_match.url_name == 'you' %}active{% endif %}"
     aria-label="You">
    <span class="material-symbols-outlined nav-icon">person</span>
    <span class="nav-label">You</span>
  </a>

  <button id="launcherBtn" class="nav-item" aria-label="More Apps">
    <span class="material-symbols-outlined nav-icon">apps</span>
    <span class="nav-label">More</span>
  </button>

</div>
