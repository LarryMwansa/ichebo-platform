<!-- components/_bottom_nav.html -->
<div class="bottom-bar" role="navigation" aria-label="Main navigation">

  <a href="{% url 'dashboard:index' %}" class="nav-item" aria-label="Home" data-nav-match="{% url 'dashboard:index' %}">
    <span class="material-symbols-outlined nav-icon">home</span>
    <span class="nav-label">Home</span>
  </a>

  <a href="{% url 'bible:reader' %}" class="nav-item" aria-label="Bible" data-nav-match="{% url 'bible:reader' %}">
    <span class="material-symbols-outlined nav-icon">auto_stories</span>
    <span class="nav-label">Bible</span>
  </a>

  <a href="{% url 'dashboard:explore' %}" class="nav-item" aria-label="Explore" data-nav-match="{% url 'dashboard:explore' %}">
    <span class="material-symbols-outlined nav-icon">explore</span>
    <span class="nav-label">Explore</span>
  </a>

  <a href="{% url 'dashboard:you' %}" class="nav-item" aria-label="You" data-nav-match="{% url 'dashboard:you' %}">
    <span class="material-symbols-outlined nav-icon">person</span>
    <span class="nav-label">You</span>
  </a>

  <button id="launcherBtn" class="nav-item" aria-label="More Apps">
    <span class="material-symbols-outlined nav-icon">apps</span>
    <span class="nav-label">More</span>
  </button>

</div>

<script>
(function () {
  function setBottomNavActive() {
    var path = window.location.pathname;
    var items = document.querySelectorAll('.bottom-bar .nav-item[data-nav-match]');
    items.forEach(function (item) {
      var match = item.getAttribute('data-nav-match');
      var isActive = (match === '/') ? (path === '/') : path.startsWith(match);
      item.classList.toggle('active', isActive);
    });
  }

  document.addEventListener('DOMContentLoaded', setBottomNavActive);
  document.addEventListener('htmx:afterSettle', setBottomNavActive);
})();
</script>
