{% load static %}
<link rel="stylesheet" href="{% static 'css/records.css' %}?v=2">

<div class="dash-widget">
  <div class="dash-widget__label" style="display: flex; justify-content: space-between; align-items: center;">
    <span>My Journals</span>
    <button class="btn-touch" style="min-height: 32px; padding: 0 12px; background: var(--primary); color: #fff; border-radius: 8px; font-size: 12px; font-weight: 600;"
            hx-get="{% url 'records:htmx-create' %}"
            hx-target="#drawerContent"
            hx-swap="innerHTML"
            onclick="window.ICSDrawer.open('New Journal Entry')">
      + New Entry
    </button>
  </div>
  
  <div class="dash-journal-grid">
    <a href="/records/?type=prayer" class="dash-journal-item dash-journal-item--prayer">
      <span class="material-symbols-outlined dash-journal-icon">self_improvement</span>
      <span class="dash-journal-name">Prayer</span>
    </a>
    <a href="/records/?type=spirit" class="dash-journal-item dash-journal-item--spirit">
      <span class="material-symbols-outlined dash-journal-icon">auto_awesome</span>
      <span class="dash-journal-name">Spirit</span>
    </a>
    <a href="/records/?type=dream" class="dash-journal-item dash-journal-item--dream">
      <span class="material-symbols-outlined dash-journal-icon">bedtime</span>
      <span class="dash-journal-name">Dream</span>
    </a>
    <a href="/records/?type=note" class="dash-journal-item dash-journal-item--note">
      <span class="material-symbols-outlined dash-journal-icon">edit_note</span>
      <span class="dash-journal-name">General</span>
    </a>
  </div>
</div>

{% if records %}
<div class="dash-widget">
  <div class="dash-widget__label">Recent Entries</div>
  <div class="list-group" id="dash-recent-list" style="display: flex; flex-direction: column; gap: 8px;">
    {% for rec in records %}
    <div class="list-item" style="padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);">
      <div class="list-item__icon">
        <span class="status-badge" style="background: var(--bg);">
          {{ rec.record_type|slice:":3"|upper }}
        </span>
      </div>
      <div class="list-item__content">
        <a class="list-item__title" href="/records/{{ rec.id }}/" style="text-decoration:none;">{{ rec.title }}</a>
        <div class="list-item__meta">{{ rec.updated_at|date:"d M" }}</div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endif %}

<div class="dash-widget" style="margin-top: 12px; padding: 0;">
  <a href="/records/" class="dash-cta" style="display:block; padding: 16px; text-align:center; font-weight:600; text-decoration:none; color: var(--primary);">View All Journals →</a>
</div>
