<div id="drawerBack" hx-swap-oob="innerHTML"></div>
<div id="drawerTitle" hx-swap-oob="innerHTML">Search Scripture</div>
<div id="drawerActions" hx-swap-oob="innerHTML"></div>

<div class="bible-search-sheet" style="height: 75vh; display: flex; flex-direction: column; margin: -20px;">
  
  {# Search Input Header #}
  <div style="padding: 1rem; border-bottom: 1px solid var(--border); background: var(--bg);">
    <div style="position: relative; display: flex; align-items: center;">
      <span class="material-symbols-outlined" style="position: absolute; left: 12px; color: var(--muted); font-size: 20px;">search</span>
      <input type="text" 
             name="q" 
             placeholder="Search words, phrases, or verses..." 
             class="form-input-touch"
             style="padding-left: 44px; width: 100%; border-radius: 12px;"
             hx-get="{% url 'bible:htmx-search' %}" 
             hx-trigger="keyup changed delay:300ms, search" 
             hx-target="#search-results-output" 
             autocomplete="off"
             autofocus>
    </div>
    
    {# Quick Chips #}
    <div style="display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none;">
      <button class="btn-touch" style="font-size: 11px; padding: 4px 12px; min-height: 32px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; white-space: nowrap; font-weight: 600;" onclick="this.closest('.bible-search-sheet').querySelector('input').value='Jesus'; this.closest('.bible-search-sheet').querySelector('input').dispatchEvent(new Event('search'))">Jesus</button>
      <button class="btn-touch" style="font-size: 11px; padding: 4px 12px; min-height: 32px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; white-space: nowrap; font-weight: 600;" onclick="this.closest('.bible-search-sheet').querySelector('input').value='Love'; this.closest('.bible-search-sheet').querySelector('input').dispatchEvent(new Event('search'))">Love</button>
      <button class="btn-touch" style="font-size: 11px; padding: 4px 12px; min-height: 32px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; white-space: nowrap; font-weight: 600;" onclick="this.closest('.bible-search-sheet').querySelector('input').value='Spirit'; this.closest('.bible-search-sheet').querySelector('input').dispatchEvent(new Event('search'))">Spirit</button>
      <button class="btn-touch" style="font-size: 11px; padding: 4px 12px; min-height: 32px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; white-space: nowrap; font-weight: 600;" onclick="this.closest('.bible-search-sheet').querySelector('input').value='Faith'; this.closest('.bible-search-sheet').querySelector('input').dispatchEvent(new Event('search'))">Faith</button>
    </div>
  </div>

  {# Scrollable Results #}
  <div id="search-results-output" style="flex: 1; overflow-y: auto; padding: 1rem;">
    <div style="padding: 4rem 2rem; text-align: center; color: var(--muted);">
      <span class="material-symbols-outlined" style="font-size: 48px; opacity: 0.2; margin-bottom: 1rem;">manage_search</span>
      <p style="font-size: 0.9rem;">Start typing to search the Bible...</p>
    </div>
  </div>

</div>
