<div id="drawerBack" hx-swap-oob="innerHTML">
  <button hx-get="{% url 'bible:picker' %}?book_code={{ book_code }}&chapter={{ chapter }}" 
          hx-target="#drawerContent" 
          hx-swap="innerHTML"
          class="btn-touch" 
          style="border:none; background:transparent; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; color: var(--primary);">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>
</div>
<div id="drawerTitle" hx-swap-oob="innerHTML">Select Version</div>
<div id="drawerActions" hx-swap-oob="innerHTML"></div>

<div class="bible-versions-sheet" style="height: 60vh; display: flex; flex-direction: column; margin: -20px;">
  <div style="padding: 0 1rem 1rem; flex: 1; overflow-y: auto;">
    {% for language, lang_versions in versions_by_language.items %}
    <div style="margin-top: 1.5rem;">
      <div class="label-caps" style="padding: 0 1rem;">{{ language }}</div>
      <div class="list-group">
        {% for ver in lang_versions %}
        <button class="list-item {% if ver == current_translation %}bible-picker-item--active{% endif %}"
                onclick="mSelectVersion('{{ ver.code }}', '{{ book_code }}', {{ chapter }})"
                style="width: 100%; border:none; text-align:left; background: transparent; cursor: pointer;">
          <div class="list-item__content">
            <div class="list-item__title" style="color: {% if ver == current_translation %}var(--primary){% else %}var(--text){% endif %}; font-weight: {% if ver == current_translation %}700{% else %}500{% endif %};">{{ ver.name }}</div>
            <div class="list-item__meta">{{ ver.code }}</div>
          </div>
          {% if ver == current_translation %}
          <div class="list-item__action"><span class="material-symbols-outlined" style="color: var(--primary);">check_circle</span></div>
          {% endif %}
        </button>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>

  <div style="padding: 1rem; border-top: 1px solid var(--border); background: var(--card);">
    <button class="btn-touch"
            hx-get="{% url 'bible:languages' %}?book_code={{ book_code }}&chapter={{ chapter }}"
            hx-target="#drawerContent"
            style="width: 100%; background: var(--bg); color: var(--primary); border: 1px solid var(--border); border-radius: 8px;">
      Change Language
    </button>
  </div>
</div>

<script>
async function mSelectVersion(translationCode, bookCode, chapter) {
  const chapterDiv = document.getElementById('m-bible-chapter')
                  || document.getElementById('bible-chapter');

  const formData = new FormData();
  formData.append('translation_code', translationCode);
  formData.append('book_code', bookCode);
  formData.append('chapter', chapter);
  formData.append('csrfmiddlewaretoken', document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '');

  try {
    const res = await fetch('{% url "bible:htmx-set-translation" %}', {
      method: 'POST',
      headers: { 'X-CSRFToken': document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '' },
      body: formData,
    });
    if (!res.ok) return;
    const html = await res.text();

    if (chapterDiv) {
      chapterDiv.innerHTML = html;
      chapterDiv.dataset.bookCode = bookCode;
      chapterDiv.dataset.chapter  = chapter;
      htmx.process(chapterDiv);
    }

    // Update mobile version badge
    const badge = document.querySelector('#m-bible-topbar .status-badge');
    if (badge) badge.textContent = translationCode;

    // Update desktop options bar active version display
    const desktopVersion = document.getElementById('bible-active-version');
    if (desktopVersion) {
      desktopVersion.querySelector('[style*="font-size: 22px"]').textContent = translationCode;
    }

    window.scrollTo({ top: 0, behavior: 'instant' });
  } catch(e) { console.error(e); }

  window.ICSDrawer && window.ICSDrawer.close();
}
</script>
