<div id="confirm-slot-{{ inductee.id }}"
     style="border: 1px solid var(--primary); border-radius: 10px; padding: 16px 18px;
            background: var(--card); margin-top: 12px;">
    <div style="display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px;">
        <span class="material-symbols-outlined"
              style="font-size: 20px; color: var(--primary); flex-shrink: 0; margin-top: 1px;">how_to_reg</span>
        <div>
            <div style="font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px;">
                Confirm induction for {{ name }}?
            </div>
            <div style="font-size: 12px; color: var(--muted); line-height: 1.5;">
                This will advance them to <strong style="color: var(--text);">Level 1</strong>
                {% if placement_tenant %}and place them in <strong style="color: var(--text);">{{ placement_tenant.name }}</strong>{% endif %}.
                This action cannot be undone.
            </div>
        </div>
    </div>
    <div style="display: flex; gap: 8px; justify-content: flex-end;">
        <button onclick="document.getElementById('confirm-slot-{{ inductee.id }}').innerHTML = ''"
                style="height: 34px; padding: 0 14px; background: none; border: 1px solid var(--border);
                       border-radius: 8px; font-size: 12px; font-weight: 700;
                       color: var(--text); cursor: pointer;">
            Cancel
        </button>
        <button class="ws-topbar__cta"
                hx-post="{% url 'learn:htmx-induction-confirm' inductee.id %}"
                hx-target="#inductee-{{ inductee.id }}"
                hx-swap="outerHTML"
                hx-include="#notes-{{ inductee.id }}, #placement-{{ inductee.id }}"
                style="background: var(--primary); color: #fff; border: none; cursor: pointer;
                       height: 34px; font-size: 12px;">
            <span class="material-symbols-outlined" style="font-size: 16px;">check_circle</span>
            Yes, Confirm &amp; Advance
        </button>
    </div>
</div>
