<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}Ichebo{% endblock %} — Ichebo Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/global.css">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/accounts.css">

  <style>
    .auth-logo { filter: brightness(0); }
    html.dark .auth-logo { filter: brightness(0) invert(1); }
  </style>

  <script src="/static/js/storage.js"></script>
  <script>
    /* Apply saved theme before first paint to avoid flash */
    (function() {
      var theme = localStorage.getItem('ics_theme') || 'light';
      if (theme === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="auth-shell">

  <button id="themeToggle"
          aria-label="Toggle theme"
          style="position:fixed;top:16px;right:16px;z-index:100;
                 width:40px;height:40px;border-radius:50%;
                 background:var(--card);border:1px solid var(--border);
                 display:flex;align-items:center;justify-content:center;
                 cursor:pointer;color:var(--text);transition:background 0.15s;">
    <span class="material-symbols-outlined sun" aria-hidden="true" style="font-size:20px;">light_mode</span>
    <span class="material-symbols-outlined moon" aria-hidden="true" style="font-size:20px;">dark_mode</span>
  </button>

  <main class="auth-main">
    {% block content %}{% endblock %}
  </main>

  <script>
    document.getElementById('themeToggle').addEventListener('click', function() {
      var current = window.ICSStorage ? window.ICSStorage.getTheme() : (document.documentElement.classList.contains('dark') ? 'dark' : 'light');
      var next = current === 'dark' ? 'light' : 'dark';
      if (window.ICSStorage) {
        window.ICSStorage.setTheme(next);
      } else {
        document.documentElement.classList.toggle('dark', next === 'dark');
      }
    });
  </script>
</body>
</html>
