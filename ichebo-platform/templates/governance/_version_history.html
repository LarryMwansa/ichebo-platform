<div id="version-history-panel" style="padding-top: 4px;">
  {% if chain %}
  <div style="display: flex; flex-direction: column; gap: 8px;">
    {% for v in chain %}
    <div style="display: flex; align-items: flex-start; gap: 10px; position: relative; padding-bottom: 8px;">
      {% if not forloop.last %}
      <div style="position: absolute; left: 6px; top: 12px; bottom: 0; border-left: 1px solid var(--border);"></div>
      {% endif %}
      <div style="width: 12px; height: 12px; border-radius: 50%; border: 2px solid {% if v.id == record.id %}var(--primary){% else %}var(--border){% endif %}; background: var(--bg); z-index: 1; margin-top: 2px;"></div>
      
      <div style="flex: 1; font-size: 11px;">
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
          <span style="font-weight: 700; color: var(--text);">V{{ v.version|default:1 }}</span>
          <span style="opacity: 0.6;">{{ v.created_at|date:"d M y" }}</span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2px;">
          <span style="opacity: 0.7; font-size: 10px; text-transform: uppercase;">{{ v.status }}</span>
          {% if v.id != record.id %}
          <a href="{% if v.record_type in 'class,principle,concept,divine_pattern,subject,entity,narrative,framework' %}{% url 'governance:reference-detail' v.id %}{% else %}{% url 'governance:mandate-detail' v.id %}{% endif %}"
             style="color: var(--primary); text-decoration: none;"
             hx-get="{% if v.record_type in 'class,principle,concept,divine_pattern,subject,entity,narrative,framework' %}{% url 'governance:reference-detail' v.id %}{% else %}{% url 'governance:mandate-detail' v.id %}{% endif %}"
             hx-target="#ws-detail"
             hx-push-url="true">View</a>
          {% else %}
          <span style="color: var(--primary); font-weight: 700;">Active</span>
          {% endif %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p style="font-size: 11px; color: var(--muted); padding: 8px 0;">Initial Version</p>
  {% endif %}
</div>
