<div class="gov-branch-card">
  <div class="gov-branch-label">Reference Library</div>
  <div class="gov-type-list">
    {% for slug, label in library_types.items %}
    <a href="{% url 'governance:reference-list' slug %}"
       class="gov-type-pill"
       hx-get="{% url 'governance:reference-list' slug %}"
       hx-target="#governance-content"
       hx-push-url="true">
      {{ label }}
    </a>
    {% endfor %}
  </div>
  <a href="{% url 'governance:reference-home' %}" class="gov-action-btn"
     hx-get="{% url 'governance:reference-home' %}"
     hx-target="#governance-content"
     hx-push-url="true">
    Open Library →
  </a>
</div>
