<div class="card" style="border-radius: var(--radius-l); padding: var(--space-s);">
  <div class="label-caps" style="color: var(--primary); margin-bottom: var(--space-xs);">Reference Library</div>
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3xs); margin-bottom: var(--space-s);">
    {% for slug, label in library_types.items %}
    <a href="{% url 'governance:library-list' slug %}"
       style="display: flex; align-items: center; justify-content: center;
              padding: 8px 4px; background: var(--card-2); border: 1px solid var(--border);
              border-radius: var(--radius-m); font-size: 12px; font-weight: 600;
              text-decoration: none; color: var(--muted); text-align: center;"
       hx-get="{% url 'governance:library-list' slug %}"
       hx-target="#governance-content" hx-push-url="true">
      {{ label }}
    </a>
    {% endfor %}
  </div>
  <a href="{% url 'governance:library-home' %}"
     class="btn-touch" style="width: 100%; justify-content: center; text-decoration: none;"
     hx-get="{% url 'governance:library-home' %}"
     hx-target="#governance-content" hx-push-url="true">
    Open Library
    <span class="material-symbols-outlined" style="font-size: 18px;">chevron_right</span>
  </a>
</div>
