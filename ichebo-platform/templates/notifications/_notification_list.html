{% if notifications %}

<div id="notification-list"
     style="background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;">
    {% for n in notifications %}
    {% include "notifications/_notification_card.html" %}
    {% endfor %}
</div>

{% else %}

<div style="text-align: center; padding: 80px 24px;">
    <span class="material-symbols-outlined"
          style="font-size: 48px; opacity: 0.1; display: block;
                 color: var(--text); margin-bottom: 16px;">notifications_off</span>
    <p style="font-size: 14px; font-weight: 600; color: var(--text); margin: 0 0 6px;">
        No notifications yet
    </p>
    <p style="font-size: 12px; color: var(--muted); max-width: 300px; margin: 0 auto; line-height: 1.6;">
        You'll be notified here about community activity, assigned tasks, and formation milestones.
    </p>
</div>

{% endif %}
