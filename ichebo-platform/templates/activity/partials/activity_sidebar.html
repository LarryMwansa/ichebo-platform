{# templates/activity/partials/activity_sidebar.html #}
<div style="display: flex; flex-direction: column; gap: 4px; padding: var(--space-s) 0;">

    <div class="ws-label-tag" style="margin-bottom: var(--space-2xs);">Strategic Filters</div>
    <a href="{% url 'activity:activity-home' %}" class="ctx-btn {% if not active_type %}active{% endif %}">
        <span class="material-symbols-outlined">all_inclusive</span>
        All Activity
    </a>
    <a href="{% url 'activity:activity-home' %}?type=task" class="ctx-btn {% if active_type == 'task' %}active{% endif %}">
        <span class="material-symbols-outlined">check_circle</span>
        Tasks
    </a>
    <a href="{% url 'activity:activity-home' %}?type=habit" class="ctx-btn {% if active_type == 'habit' %}active{% endif %}">
        <span class="material-symbols-outlined">autorenew</span>
        Habits
    </a>
    <a href="{% url 'activity:activity-home' %}?type=goal" class="ctx-btn {% if active_type == 'goal' %}active{% endif %}">
        <span class="material-symbols-outlined">trophy</span>
        Goals
    </a>
    <a href="{% url 'activity:activity-home' %}?type=event" class="ctx-btn {% if active_type == 'event' %}active{% endif %}">
        <span class="material-symbols-outlined">calendar_today</span>
        Events
    </a>

    <div class="ctx-divider"></div>

    <div class="ws-label-tag" style="margin-bottom: var(--space-2xs);">Time Context</div>
    <a href="{% url 'calendar:month' %}"
       class="ctx-btn {% if request.resolver_match.namespace == 'calendar' %}active{% endif %}">
        <span class="material-symbols-outlined">calendar_month</span>
        Activity Calendar
    </a>
    <a href="{% url 'activity:ministry' %}" class="ctx-btn">
        <span class="material-symbols-outlined">hub</span>
        Ministry Hub
    </a>

</div>
