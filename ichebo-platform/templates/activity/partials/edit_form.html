<form class="record-drawer-form"
      hx-post="{% url 'activity:htmx-edit' activity.id %}"
      hx-target="#drawerInner"
      hx-swap="none">
  {% csrf_token %}

  <div class="record-form-group">
    <label class="label-caps" style="color:var(--muted);margin-bottom:8px;display:block;">
      Edit Activity ({{ activity.activity_type|title }})
    </label>
    <input type="text" name="title" value="{{ activity.title }}"
           class="form-input-touch" style="width:100%;" required autofocus autocomplete="off">
  </div>

  <div class="record-form-group">
    <label class="label-caps" style="color:var(--muted);margin-bottom:8px;display:block;">Description</label>
    <textarea name="description" rows="3"
              class="form-input-touch" style="width:100%;resize:vertical;">{{ activity.description|default:'' }}</textarea>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:var(--space-m);">
    <div>
      <label class="label-caps" style="color:var(--muted);margin-bottom:8px;display:block;">Status</label>
      <select name="status" class="form-input-touch" style="width:100%;">
        <option value="pending"     {% if activity.status == 'pending'     %}selected{% endif %}>Pending</option>
        <option value="in_progress" {% if activity.status == 'in_progress' %}selected{% endif %}>In Progress</option>
        <option value="completed"   {% if activity.status == 'completed'   %}selected{% endif %}>Completed</option>
      </select>
    </div>
    <div>
      <label class="label-caps" style="color:var(--muted);margin-bottom:8px;display:block;">Recurrence</label>
      <select name="recurrence" class="form-input-touch" style="width:100%;">
        <option value="none"    {% if activity.recurrence == 'none'    %}selected{% endif %}>None</option>
        <option value="daily"   {% if activity.recurrence == 'daily'   %}selected{% endif %}>Daily</option>
        <option value="weekly"  {% if activity.recurrence == 'weekly'  %}selected{% endif %}>Weekly</option>
        <option value="monthly" {% if activity.recurrence == 'monthly' %}selected{% endif %}>Monthly</option>
      </select>
    </div>
  </div>

  <div class="record-form-group">
    <label class="label-caps" style="color:var(--muted);margin-bottom:8px;display:block;">Due Date</label>
    <input type="date" name="due_at"
           value="{% if activity.due_at %}{{ activity.due_at|date:'Y-m-d' }}{% endif %}"
           class="form-input-touch" style="width:100%;">
  </div>

  <div style="display:flex;gap:8px;">
    <button type="submit" class="btn-touch btn-touch--primary" style="flex:2;">
      Save Changes
    </button>
    <button type="button" class="btn-touch" style="flex:1;"
            onclick="window.ICSDrawer.close()">
      Cancel
    </button>
  </div>
</form>
