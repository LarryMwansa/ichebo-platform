{% extends "base_auth.html" %}

{% block auth_title %}Invitation Problem{% endblock %}

{% block auth_body %}
<div style="text-align:center">
  <span class="material-symbols-outlined" style="font-size:2.5rem;color:var(--error)">error</span>
  <h2 style="margin:0.5rem 0 0.25rem;font-size:1.2rem;font-weight:700">Can't Accept Invitation</h2>
  <p style="color:var(--muted);font-size:0.88rem;margin:0 0 1.5rem">{{ reason }}</p>
  <a href="{% url 'dashboard:index' %}" class="btn btn-primary" style="display:block;text-align:center;padding:0.65rem">
    Go to Dashboard
  </a>
</div>
{% endblock %}
