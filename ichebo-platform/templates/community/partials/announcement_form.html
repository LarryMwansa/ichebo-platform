<div id="announcement-form"
     style="background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 24px 28px; margin-bottom: 16px;">

    <div style="margin-bottom: 20px;">
        <div class="ws-label-tag">New Announcement</div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 16px;">

        <div>
            <label style="display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
                           letter-spacing: 0.07em; color: var(--muted); margin-bottom: 6px;">Title</label>
            <input type="text" name="title" placeholder="Announcement title" required
                   style="display: block; width: 100%; height: 40px; padding: 0 12px;
                          background: var(--card-2); border: 1px solid var(--border);
                          border-radius: 8px; font-size: 13px; color: var(--text);
                          outline: none; box-sizing: border-box; transition: border-color 0.15s;"
                   onfocus="this.style.borderColor='var(--primary)'"
                   onblur="this.style.borderColor='var(--border)'">
        </div>

        <div>
            <label style="display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
                           letter-spacing: 0.07em; color: var(--muted); margin-bottom: 6px;">Content</label>
            <textarea name="content" rows="4" placeholder="Announcement message…"
                      style="display: block; width: 100%; padding: 10px 12px;
                             background: var(--card-2); border: 1px solid var(--border);
                             border-radius: 8px; font-size: 13px; color: var(--text);
                             font-family: inherit; outline: none; resize: vertical;
                             box-sizing: border-box; line-height: 1.6; transition: border-color 0.15s;"
                      onfocus="this.style.borderColor='var(--primary)'"
                      onblur="this.style.borderColor='var(--border)'"></textarea>
        </div>

        <div style="display: flex; gap: 12px; align-items: center; padding-top: 4px;
                    border-top: 1px solid var(--border); margin-top: 4px;">
            <button class="ws-topbar__cta"
                    hx-post="{% url 'community:htmx-create-announcement' %}"
                    hx-target="#announcement-list"
                    hx-swap="innerHTML"
                    hx-include="#announcement-form"
                    style="background: var(--primary); color: #fff; border: none; cursor: pointer;">
                <span class="material-symbols-outlined">campaign</span>
                Publish Announcement
            </button>
            <button type="button"
                    onclick="this.closest('#announcement-form').remove()"
                    style="background: none; border: none; cursor: pointer; font-size: 13px;
                           color: var(--muted); font-weight: 600;">
                Cancel
            </button>
        </div>

    </div>
</div>
