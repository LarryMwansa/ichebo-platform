<form class="record-drawer-form"
      hx-post="{% url 'records:htmx-edit' record.id %}"
      hx-target="#drawerInner"
      hx-swap="none">
  {% csrf_token %}

  <div class="record-form-group">
    <label class="label-caps" style="color: var(--muted); margin-bottom: 8px; display: block;">Entry Type</label>
    <select name="record_type" class="form-input-touch" style="width: 100%;">
      {% for value, label in record_types %}
      <option value="{{ value }}" {% if value == record.record_type %}selected{% endif %}>
        {{ label }}
      </option>
      {% endfor %}
    </select>
  </div>

  <div class="record-form-group">
    <label class="label-caps" style="color: var(--muted); margin-bottom: 8px; display: block;">Title</label>
    <input type="text" name="title" value="{{ record.title }}"
           class="form-input-touch" style="width: 100%;" required autocomplete="off">
  </div>

  <div class="record-form-group">
    <label class="label-caps" style="color: var(--muted); margin-bottom: 8px; display: block;">Notes</label>
    <textarea name="content" class="form-input-touch"
              style="width: 100%; min-height: 160px;" rows="6">{{ record.content }}</textarea>
  </div>

  <div style="margin-top: 2rem; display: flex; gap: 8px;">
    <button type="submit" class="btn-touch btn-touch--primary" style="flex: 2;">
      Save Changes
    </button>
    <button type="button" class="btn-touch" style="flex: 1;"
            onclick="window.ICSDrawer.close()">
      Cancel
    </button>
  </div>
</form>
