{% if results %}
{% for record in results %}
<div style="display: flex; align-items: center; gap: 10px; padding: 10px 12px;
            border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s;"
     onmouseover="this.style.background='var(--hover)'"
     onmouseout="this.style.background=''">
    <div style="flex: 1; min-width: 0;">
        <div style="font-size: 12px; font-weight: 600; color: var(--text);
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
            {{ record.title }}
        </div>
        <div style="font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em;">
            {{ record.record_family }} · {{ record.record_type }}
        </div>
    </div>
    <button onclick="bibleLinkSelectRecord('{{ record.id }}', '{{ record.title|escapejs }}')"
            style="flex-shrink: 0; padding: 5px 10px; border-radius: 6px;
                   background: var(--primary); color: #fff; border: none;
                   font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap;">
        Link
    </button>
</div>
{% endfor %}
{% elif query %}
<div style="padding: 24px; text-align: center;">
    <p style="font-size: 12px; color: var(--muted);">No records match "{{ query }}".</p>
</div>
{% else %}
<div style="padding: 24px; text-align: center;">
    <p style="font-size: 12px; color: var(--muted);">Type to search records.</p>
</div>
{% endif %}
