{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Sidecar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="{% static 'css/variables.css' %}">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/workspace_v2.css' %}">
    
    <style>
        :root {
            --ink-bg: #0E0E0E;
            --ink-2: #161616;
            --stone-bg: #F5F3F0;
            --stone-2: #ECE9E4;
            --accent-red: #AF3236;
            --text-ink: #1A1A1A;
            --text-muted-ink: #636e72;
            --border-ink: rgba(0,0,0,0.05);
        }
        .dark {
            --stone-bg: #111111;
            --stone-2: #161616;
            --text-ink: #F5F3F0;
            --text-muted-ink: #9a9a9a;
            --border-ink: rgba(255,255,255,0.1);
        }
        body {
            background: transparent;
            margin: 0;
            padding: 0;
            color: var(--text-ink);
            overflow-x: hidden;
        }
        .sidecar-container {
            padding: var(--space-m);
        }
        .bible-chapter-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: var(--space-m);
            color: var(--text-ink);
        }
        .bible-verse {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: var(--space-s);
            color: var(--text-ink);
        }
        .bible-verse-num {
            font-weight: 800;
            font-size: 10px;
            color: var(--accent-red);
            vertical-align: super;
            margin-right: 4px;
        }
        /* Custom scrollbar for sidecar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-ink); border-radius: 10px; }
        
        .sidecar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-m);
            position: sticky;
            top: 0;
            background: var(--stone-2);
            padding: 8px 0;
            z-index: 10;
            border-bottom: 1px solid var(--border-ink);
        }
        .sidecar-nav-btn {
            background: transparent;
            border: none;
            color: var(--text-ink);
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .sidecar-nav-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="sidecar-container">
        {% block content %}{% endblock %}
    </div>
    
    <script src="{% static 'js/htmx.min.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
