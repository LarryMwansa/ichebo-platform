{# templates/activity/partials/activity_card.html #}
<div class="activity-card-container" style="position: relative;" 
     id="activity-{{ activity.id }}" 
     hx-get="{% url 'activity:activity-detail' activity.id %}"
     hx-target="#main-stage"
     hx-select="#main-stage"
     hx-push-url="true">
  
  {# Connection Node #}
  <div class="timeline-node" style="position: absolute; left: -44px; top: 25px; width: 13px; height: 13px; background: var(--stone-bg); border: 2px solid {% if activity.due_at < now %}var(--accent-red){% else %}var(--muted){% endif %}; border-radius: 50%; z-index: 2;"></div>

  <div class="ws-card-v2 activity-card" style="background: var(--stone-bg); border: 1px solid rgba(0,0,0,0.05); padding: 30px; border-radius: 12px; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
    
    <div style="display: flex; align-items: center; gap: 20px;">
        {# Status Icon #}
        <div class="status-icon-box" style="width: 40px; height: 40px; border-radius: 8px; background: rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: center; color: var(--muted);">
            <span class="material-symbols-outlined" style="font-size: 20px;">
                {% if activity.activity_type == 'task' %}task_alt{% elif activity.activity_type == 'habit' %}autorenew{% elif activity.activity_type == 'goal' %}trophy{% else %}event{% endif %}
            </span>
    </button>
  </div>
</div>

<style>
.timeline-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    border-color: rgba(0,0,0,0.1) !important;
}
</style>
