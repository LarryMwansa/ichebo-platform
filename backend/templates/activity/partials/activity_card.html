<div class="list-item activity-item" id="activity-{{ activity.id }}" 
     hx-swap-oob="afterbegin:#activity-list-upcoming"
     hx-get="{% url 'activity:activity-detail' activity.id %}"
     hx-target="#main-content"
     hx-push-url="true"
     style="cursor: pointer;">
  <div class="list-item__icon">
    <span class="status-badge 
      {% if activity.due_at and activity.due_at < now %}status-badge--danger
      {% elif activity.due_at and activity.due_at.date == now.date %}status-badge--active
      {% elif activity.activity_type == 'reminder' %}status-badge--warning
      {% else %}status-badge--muted{% endif %}">
      {{ activity.activity_type|slice:":3"|upper }}
    </span>
  </div>

  <div class="list-item__content">
    <div class="list-item__title" style="font-weight: 700;">{{ activity.title }}</div>
    <div class="list-item__meta" style="display: flex; align-items: center; gap: 8px;">
      {% if activity.due_at %}
      <span class="activity-due {% if activity.due_at < now %}activity-due--overdue{% endif %}" style="font-size: 11px; display: flex; align-items: center; gap: 4px;">
        <span class="material-symbols-outlined" style="font-size: 14px;">calendar_today</span>
        {{ activity.due_at|date:"d M" }}
      </span>
      {% endif %}
      {% if activity.recurrence != 'none' %}
      <span class="badge-unit" style="font-size: 9px;"><span class="material-symbols-outlined" style="font-size: 10px;">sync</span> {{ activity.recurrence }}</span>
      {% endif %}
    </div>
  </div>

  <div class="activity-actions" onclick="event.stopPropagation();">
    <button class="activity-action-btn activity-action-btn--complete"
            hx-post="{% url 'activity:htmx-complete' activity.id %}"
            hx-target="#activity-{{ activity.id }}"
            hx-swap="outerHTML"
            title="Mark Done">
      <span class="material-symbols-outlined" style="font-size: 20px;">check_circle</span>
    </button>
    <button class="activity-action-btn"
            hx-get="{% url 'activity:htmx-edit' activity.id %}"
            hx-target="#drawerInner"
            hx-swap="innerHTML"
            onclick="window.ICSDrawer.open('Edit Activity')"
            title="Edit">
      <span class="material-symbols-outlined" style="font-size: 20px;">more_vert</span>
    </button>
  </div>
</div>
