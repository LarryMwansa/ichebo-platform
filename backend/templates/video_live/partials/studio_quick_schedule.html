<div style="padding: 20px;">

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
        <div>
            <div style="font-size: 10px; font-weight: 700; text-transform: uppercase;
                        letter-spacing: 0.07em; color: var(--muted); margin-bottom: 4px;">Quick Schedule</div>
            <div style="font-size: 14px; font-weight: 700; color: var(--text);">
                {{ slot_label|default:"New Broadcast" }}
            </div>
        </div>
        <button onclick="document.getElementById('studio-form-panel').innerHTML = ''"
                style="background: none; border: none; cursor: pointer; color: var(--muted);
                       display: flex; align-items: center; padding: 4px;">
            <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
        </button>
    </div>

    {% if error %}
    <div style="padding: 10px 12px; background: var(--card-2); border: 1px solid #e53e3e;
                border-radius: 6px; font-size: 12px; color: #e53e3e; margin-bottom: 14px;">
        {{ error }}
    </div>
    {% endif %}

    <form hx-post="{% url 'video_live:studio-quick-schedule' %}"
          hx-target="#studio-form-panel"
          hx-swap="innerHTML"
          style="display: flex; flex-direction: column; gap: 12px;">
        {% csrf_token %}

        <div>
            <label style="display: block; font-size: 10px; font-weight: 700; text-transform: uppercase;
                           letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px;">
                Title *
            </label>
            <input type="text" name="title" required
                   placeholder="e.g. Sunday Service"
                   style="display: block; width: 100%; height: 38px; padding: 0 10px;
                          background: var(--card-2); border: 1px solid var(--border);
                          border-radius: 8px; font-size: 13px; color: var(--text);
                          outline: none; box-sizing: border-box;"
                   onfocus="this.style.borderColor='var(--primary)'"
                   onblur="this.style.borderColor='var(--border)'">
        </div>

        <div>
            <label style="display: block; font-size: 10px; font-weight: 700; text-transform: uppercase;
                           letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px;">
                Stream URL *
            </label>
            <input type="url" name="stream_url" required
                   placeholder="https://youtu.be/..."
                   style="display: block; width: 100%; height: 38px; padding: 0 10px;
                          background: var(--card-2); border: 1px solid var(--border);
                          border-radius: 8px; font-size: 13px; color: var(--text);
                          outline: none; box-sizing: border-box;"
                   onfocus="this.style.borderColor='var(--primary)'"
                   onblur="this.style.borderColor='var(--border)'">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label style="display: block; font-size: 10px; font-weight: 700; text-transform: uppercase;
                               letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px;">
                    Date &amp; Time *
                </label>
                <input type="datetime-local" name="scheduled_at" required
                       style="display: block; width: 100%; height: 38px; padding: 0 10px;
                              background: var(--card-2); border: 1px solid var(--border);
                              border-radius: 8px; font-size: 12px; color: var(--text);
                              outline: none; box-sizing: border-box;"
                       onfocus="this.style.borderColor='var(--primary)'"
                       onblur="this.style.borderColor='var(--border)'">
            </div>
            <div>
                <label style="display: block; font-size: 10px; font-weight: 700; text-transform: uppercase;
                               letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px;">
                    Duration
                </label>
                <select name="duration_minutes"
                        style="display: block; width: 100%; height: 38px; padding: 0 10px;
                               background: var(--card-2); border: 1px solid var(--border);
                               border-radius: 8px; font-size: 13px; color: var(--text);
                               outline: none; box-sizing: border-box;">
                    <option value="15">15 min</option>
                    <option value="30">30 min</option>
                    <option value="60" selected>1 hour</option>
                    <option value="90">1.5 hours</option>
                    <option value="120">2 hours</option>
                    <option value="180">3 hours</option>
                </select>
            </div>
        </div>

        <div style="display: flex; gap: 8px; padding-top: 4px;">
            <button type="button"
                    onclick="document.getElementById('studio-form-panel').innerHTML = ''"
                    style="flex: 1; height: 38px; background: none; border: 1px solid var(--border);
                           border-radius: 8px; font-size: 12px; font-weight: 700;
                           color: var(--text); cursor: pointer;">
                Cancel
            </button>
            <button type="submit" class="ws-topbar__cta"
                    style="flex: 2; background: var(--primary); color: #fff;
                           border: none; cursor: pointer; font-size: 12px;">
                <span class="material-symbols-outlined" style="font-size: 16px;">add_circle</span>
                Add to Schedule
            </button>
        </div>

    </form>

</div>
