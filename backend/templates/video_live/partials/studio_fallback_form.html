<div style="padding: 16px;">

    <div style="font-size: 10px; font-weight: 700; text-transform: uppercase;
                letter-spacing: 0.07em; color: var(--muted); margin-bottom: 12px;">
        Default Loop Video
    </div>

    {% if saved %}
    <div style="font-size: 12px; color: var(--primary); margin-bottom: 10px;
                display: flex; align-items: center; gap: 6px;">
        <span class="material-symbols-outlined" style="font-size: 15px;">check_circle</span>
        Saved
    </div>
    {% endif %}

    <form hx-post="{% url 'video_live:studio-set-fallback' %}"
          hx-target="#studio-fallback-panel"
          hx-swap="innerHTML"
          style="display: flex; flex-direction: column; gap: 10px;">
        {% csrf_token %}

        <div>
            <label style="display: block; font-size: 10px; font-weight: 700; text-transform: uppercase;
                           letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px;">
                Label
            </label>
            <input type="text" name="fallback_label"
                   value="{{ fallback.title|default:'Default Loop' }}"
                   placeholder="Default Loop"
                   style="display: block; width: 100%; height: 36px; padding: 0 10px;
                          background: var(--card-2); border: 1px solid var(--border);
                          border-radius: 8px; font-size: 12px; color: var(--text);
                          outline: none; box-sizing: border-box;"
                   onfocus="this.style.borderColor='var(--primary)'"
                   onblur="this.style.borderColor='var(--border)'">
        </div>

        <div>
            <label style="display: block; font-size: 10px; font-weight: 700; text-transform: uppercase;
                           letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px;">
                Stream URL
            </label>
            <input type="url" name="fallback_url"
                   value="{{ fallback.stream_url|default:'' }}"
                   placeholder="https://youtu.be/..."
                   style="display: block; width: 100%; height: 36px; padding: 0 10px;
                          background: var(--card-2); border: 1px solid var(--border);
                          border-radius: 8px; font-size: 12px; color: var(--text);
                          outline: none; box-sizing: border-box;"
                   onfocus="this.style.borderColor='var(--primary)'"
                   onblur="this.style.borderColor='var(--border)'">
            <div style="font-size: 10px; color: var(--muted); margin-top: 4px;">
                Plays on loop when nothing is scheduled. Leave blank to show off-air screen.
            </div>
        </div>

        <button type="submit" class="ws-topbar__cta"
                style="background: none; border: 1px solid var(--border); color: var(--text);
                       cursor: pointer; font-size: 11px; height: 34px;">
            <span class="material-symbols-outlined" style="font-size: 15px;">save</span>
            Save Fallback
        </button>

    </form>

</div>
