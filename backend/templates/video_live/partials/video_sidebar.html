<div style="display: flex; flex-direction: column; gap: 4px; padding: var(--space-s) 0;">

    <div class="ws-label-tag" style="margin-bottom: var(--space-2xs);">Broadcast Center</div>

    <a href="{% url 'video_live:home' %}"
       class="ctx-btn {% if active_video_tab == 'home' %}active{% endif %}">
        <span class="material-symbols-outlined">live_tv</span>
        Home
    </a>
    <a href="{% url 'video_live:live' %}"
       class="ctx-btn {% if active_video_tab == 'live' %}active{% endif %}">
        <span class="material-symbols-outlined">sensors</span>
        Live Now
    </a>
    <a href="{% url 'video_live:schedule' %}"
       class="ctx-btn {% if active_video_tab == 'schedule' %}active{% endif %}">
        <span class="material-symbols-outlined">calendar_month</span>
        Schedule
    </a>
    <a href="{% url 'video_live:vod' %}"
       class="ctx-btn {% if active_video_tab == 'vod' %}active{% endif %}">
        <span class="material-symbols-outlined">video_library</span>
        Recordings
    </a>

    {% if can_manage %}
    <div class="ctx-divider"></div>
    <div class="ws-label-tag" style="margin-bottom: var(--space-2xs);">Management</div>
    <a href="{% url 'video_live:studio' %}"
       class="ctx-btn {% if active_video_tab == 'studio' %}active{% endif %}">
        <span class="material-symbols-outlined">settings_input_component</span>
        Broadcast Studio
    </a>
    <a href="{% url 'video_live:manage' %}"
       class="ctx-btn {% if active_video_tab == 'manage' %}active{% endif %}">
        <span class="material-symbols-outlined">manage_accounts</span>
        Manage Broadcasts
    </a>
    {% endif %}

</div>
