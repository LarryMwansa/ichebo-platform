<!-- Global Search Overlay — Premium command center -->
<div class="ws-search-overlay" id="ws-search-overlay">
  <div class="ws-search-container">
    
    <div class="ws-search-header">
      <span class="material-symbols-outlined">search</span>
      <input type="text" 
             id="ws-global-search-input"
             class="ws-search-input"
             placeholder="Search mandates, journal, people..."
             autocomplete="off"
             hx-get="{% url 'governance:htmx-global-search' %}"
             hx-trigger="keyup changed delay:300ms"
             hx-target="#ws-global-search-results"
             hx-swap="innerHTML">
      <kbd style="font-size: 10px; color: var(--muted); opacity: 0.5;">ESC</kbd>
    </div>

    <div class="ws-search-results" id="ws-global-search-results">
      <div style="padding: 2.5rem 2rem; text-align: center; color: var(--muted);">
        <span class="material-symbols-outlined" style="font-size: 2.5rem; opacity: 0.15; display: block; margin-bottom: 1rem;">manage_search</span>
        <p style="font-size: 14px; opacity: 0.7;">Search mandates, records, and coordinators across the Apostolic Registry.</p>
        
        <div style="margin-top: 1.5rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
          <span style="font-size: 11px; opacity: 0.5; width: 100%; margin-bottom: 4px;">QUICK JUMPS</span>
          <button class="ws-btn ws-btn--secondary" style="font-size: 11px; padding: 4px 10px;">Journal</button>
          <button class="ws-btn ws-btn--secondary" style="font-size: 11px; padding: 4px 10px;">Reference Library</button>
          <button class="ws-btn ws-btn--secondary" style="font-size: 11px; padding: 4px 10px;">Programme Mandates</button>
        </div>
      </div>
    </div>

    <div class="ws-search-footer">
      <div><kbd>↑↓</kbd> to navigate</div>
      <div><kbd>↵</kbd> to select</div>
      <div><kbd>ESC</kbd> to close</div>
    </div>

  </div>
</div>

<script>
(function() {
  const overlay = document.getElementById('ws-search-overlay');
  const input = document.getElementById('ws-global-search-input');

  window.openGlobalSearch = function() {
    overlay.classList.add('active');
    input.focus();
    input.value = '';
  };

  window.closeGlobalSearch = function() {
    overlay.classList.remove('active');
    input.blur();
  };

  // Close on Escape or click outside
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlay.classList.contains('active')) {
      closeGlobalSearch();
    }
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeGlobalSearch();
  });
})();
</script>
