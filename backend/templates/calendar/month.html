{% extends "calendar/base_calendar.html" %}

{% block cal_title %}{{ month_name }} {{ year }}{% endblock %}

{% block cal_nav %}
<a class="cal-nav-btn"
   href="{% url 'calendar:month' %}?year={{ prev_year }}&month={{ prev_month }}"
   hx-get="{% url 'calendar:month' %}?year={{ prev_year }}&month={{ prev_month }}"
   hx-target="#cal-body"
   hx-push-url="true"
   aria-label="Previous month">‹</a>

<a class="cal-nav-btn cal-nav-btn--today"
   href="{% url 'calendar:month' %}"
   hx-get="{% url 'calendar:month' %}"
   hx-target="#cal-body"
   hx-push-url="true">Today</a>

<a class="cal-nav-btn"
   href="{% url 'calendar:month' %}?year={{ next_year }}&month={{ next_month }}"
   hx-get="{% url 'calendar:month' %}?year={{ next_year }}&month={{ next_month }}"
   hx-target="#cal-body"
   hx-push-url="true"
   aria-label="Next month">›</a>
{% endblock %}

{% block cal_body %}
{% include "calendar/_month_grid.html" %}
{% endblock %}
