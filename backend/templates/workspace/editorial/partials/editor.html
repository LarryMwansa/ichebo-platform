{# templates/workspace/editorial/partials/editor.html — Unified Editorial Desk #}
{% include "workspace/editorial/partials/context_menu.html" %}

<div class="editorial-canvas" style="padding-top: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: var(--surface-bg);">
    
    <!-- Heading Hero: Design System Standard -->
    <div class="editorial-hero" style="width: 100%; max-width: 900px; padding: 0 var(--space-m); margin-bottom: 40px;">
        <div class="ws-label-tag" style="margin-bottom: 8px;">Apostolic Drafting</div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <h1 class="ws-page-title" style="margin: 0; font-size: 32px;" id="hero-title">New <em>Record</em></h1>
            <div id="hero-breadcrumb" style="font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px;">
                <span class="material-symbols-outlined" style="font-size: 16px;">chevron_right</span>
                <span id="hero-family-label">Journal</span>
            </div>
        </div>
    </div>

    <div class="editorial-workspace" style="width: 100%; max-width: 900px; padding: 0 var(--space-m); flex: 1;">
        <form id="editorial-form" class="editorial-form" style="display: flex; flex-direction: column; gap: 20px; height: 100%;">
            <input type="hidden" name="record_family" id="hidden-record-family" value="journal">
            <input type="hidden" name="record_type" id="hidden-record-type" value="{{ record.record_type|default:active_type }}">
            
            <input type="text" name="title" class="editorial-title-input" 
                   style="font-size: 28px; font-weight: 700; border: none; background: transparent; color: var(--text-main); outline: none; width: 100%;"
                   placeholder="Untitled Record..." value="{{ record.title|default:'' }}"
                   oninput="document.getElementById('hero-title').innerHTML = this.value || 'New <em>Record</em>'">
            
            <textarea name="content" id="editorial-editor" class="editorial-editor-textarea editorial-body"
                placeholder="Begin writing... The word is alive. Right-click for tools.">{{ record.content|default:'' }}</textarea>
        </form>
    </div>
</div>

<script>
    // Initialize SimpleMDE (Obsidian-style)
    var simplemde = new SimpleMDE({ 
        element: document.getElementById("editorial-editor"),
        spellChecker: false,
        status: false,
        toolbar: false, // We use the right-click menu instead
        placeholder: "Begin writing... The word is alive. Right-click for tools.",
        shortcuts: {
            "toggleBold": "Cmd-B",
            "toggleItalic": "Cmd-I",
        }
    });

    // Sync with HTMX: SimpleMDE needs to update the hidden textarea before HTMX post
    simplemde.codemirror.on("change", function(){
        document.getElementById("editorial-editor").value = simplemde.value();
    });

    // Sync hero with dial
    document.body.addEventListener('dialChanged', (e) => {
        const family = e.detail.family;
        const type = e.detail.type;
        const heroFamily = document.getElementById('hero-family-label');
        if (heroFamily) heroFamily.textContent = family.charAt(0).toUpperCase() + family.slice(1);
    });
</script>

<style>
/* Integrate SimpleMDE with ICS Dark Theme */
.CodeMirror {
    background: transparent !important;
    color: var(--text-main) !important;
    border: none !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 16px !important;
    line-height: 1.8 !important;
    height: auto !important;
    min-height: 600px !important;
}

.editor-preview-side, .editor-preview {
    background: var(--surface-bg) !important;
    color: var(--text-main) !important;
}

.CodeMirror-cursor {
    border-left: 2px solid var(--accent-red) !important;
}
</style>

<script>
    // Sync record type picker
    document.getElementById('record-type').addEventListener('change', function () {
        document.getElementById('hidden-record-type').value = this.value;
    });

    // Auto-save logic could be added here later
</script>
