{# templates/workspace/editorial/partials/command_dial.html #}
<div class="command-dial">
    <!-- Tier 1: The Family Dial (Primary Selection) -->
    <div class="dial-container dial-primary">
        <div class="dial-label">Registry Family</div>
        <div class="dial-segments" id="dial-family-segments">
            <button type="button" class="dial-segment active" data-family="journal" onclick="updateDial('journal')">Journal</button>
            <button type="button" class="dial-segment" data-family="governance" onclick="updateDial('governance')">Governance</button>
            <button type="button" class="dial-segment" data-family="activity" onclick="updateDial('activity')">Activity</button>
            <button type="button" class="dial-segment" data-family="missions" onclick="updateDial('missions')">Missions</button>
        </div>
        <div class="dial-needle" id="family-needle"></div>
    </div>

    <!-- Tier 2: The Type Dial (Contextual Selection) -->
    <div class="dial-container dial-secondary">
        <div class="dial-label" id="type-dial-label">Record Type</div>
        <div class="dial-segments" id="dial-type-segments">
            <!-- Dynamically populated by JS -->
        </div>
    </div>
</div>

<style>
.command-dial {
    display: flex;
    flex-direction: column;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border-subtle);
    z-index: 10;
}

.dial-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px 16px;
}

.dial-container.dial-primary {
    background: var(--surface-1);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.dial-container.dial-secondary {
    background: var(--surface-2);
    padding: 8px 16px;
}

.dial-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 800;
}

.dial-segments {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.dial-segment {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s ease;
}

.dial-segment:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text-main);
}

.dial-segment.active {
    background: var(--accent-red);
    border-color: var(--accent-red);
    color: white;
    box-shadow: 0 2px 8px rgba(185, 28, 28, 0.3);
}

.dial-secondary .dial-segment.active {
    background: transparent;
    color: var(--accent-red);
    border-color: var(--accent-red);
    box-shadow: none;
}
</style>

<script>
const DIAL_MAP = {
    'journal': [
        {val: 'prayer', label: 'Prayer'},
        {val: 'spirit', label: 'Spirit'},
        {val: 'dream', label: 'Dream'},
        {val: 'note', label: 'General Note'}
    ],
    'governance': [
        {val: 'decree', label: 'Decree'},
        {val: 'protocol', label: 'Protocol'},
        {val: 'ordinance', label: 'Ordinance'},
        {val: 'mandate', label: 'Mandate'}
    ],
    'activity': [
        {val: 'dar', label: 'Activity Report'},
        {val: 'task', label: 'Steward Task'}
    ],
    'missions': [
        {val: 'report', label: 'Mission Report'},
        {val: 'prophetic', label: 'Prophetic Intel'}
    ]
};

function updateDial(family) {
    // Update Family Dial UI
    document.querySelectorAll('.dial-primary .dial-segment').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.family === family);
    });

    // Update Type Dial UI
    const container = document.getElementById('dial-type-segments');
    const types = DIAL_MAP[family] || [];
    
    container.innerHTML = types.map(t => `
        <button type="button" class="dial-segment" data-type="${t.val}" onclick="selectType('${t.val}', '${family}')">
            ${t.label}
        </button>
    `).join('');

    // Default select first type
    if (types.length > 0) {
        selectType(types[0].val, family);
    }

    // Update hidden fields in form
    const form = document.getElementById('editorial-form');
    if (form) {
        const familyInput = form.querySelector('[name="record_family"]') || Object.assign(document.createElement('input'), {type: 'hidden', name: 'record_family'});
        familyInput.value = family;
        form.appendChild(familyInput);
    }
}

function selectType(type, family) {
    document.querySelectorAll('.dial-secondary .dial-segment').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.type === type);
    });

    const form = document.getElementById('editorial-form');
    if (form) {
        const typeInput = form.querySelector('[name="record_type"]') || Object.assign(document.createElement('input'), {type: 'hidden', name: 'record_type'});
        typeInput.value = type;
        form.appendChild(typeInput);
        
        // Update the "Registry Hub" label in the hub title if applicable
        const status = document.getElementById('save-status');
        if (status) status.textContent = `Drafting ${family.charAt(0).toUpperCase() + family.slice(1)}`;
    }
}

// Init
document.addEventListener('DOMContentLoaded', () => updateDial('journal'));
</script>
