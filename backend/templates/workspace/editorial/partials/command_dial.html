{# templates/workspace/editorial/partials/command_dial.html #}

<div class="ws-label-tag" style="margin-bottom: var(--space-xs);">Registry Origin</div>
<div style="display: flex; flex-direction: column; gap: 2px; margin-bottom: var(--space-s);" id="family-nav">
    <button type="button" class="ctx-btn active" data-family="journal" onclick="Dial.setFamily(this, 'journal')">
        <span class="material-symbols-outlined">menu_book</span>
        Journal
    </button>
    <button type="button" class="ctx-btn" data-family="governance" onclick="Dial.setFamily(this, 'governance')">
        <span class="material-symbols-outlined">account_balance</span>
        Governance
    </button>
    <button type="button" class="ctx-btn" data-family="activity" onclick="Dial.setFamily(this, 'activity')">
        <span class="material-symbols-outlined">task_alt</span>
        Activity
    </button>
    <button type="button" class="ctx-btn" data-family="community" onclick="Dial.setFamily(this, 'community')">
        <span class="material-symbols-outlined">groups</span>
        Community
    </button>
    <button type="button" class="ctx-btn" data-family="bible" onclick="Dial.setFamily(this, 'bible')">
        <span class="material-symbols-outlined">auto_stories</span>
        Scripture
    </button>
</div>

<div class="ctx-divider"></div>

<div class="ws-label-tag" style="margin-bottom: var(--space-xs);">Record Type</div>
<div id="type-nav"
     style="display: flex; flex-direction: column; gap: 2px;
            max-height: 240px; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;">
    {# Populated by Dial.setFamily() #}
</div>

<script>
const DIAL_MAP = {
    journal: [
        { val: 'note',   label: 'Reflection / Note',      icon: 'edit_note' },
        { val: 'prayer', label: 'Prayer',                  icon: 'church' },
        { val: 'spirit', label: 'Spirit Journal',          icon: 'self_improvement' },
        { val: 'dream',  label: 'Dream Journal',           icon: 'bedtime' },
        { val: 'dar',    label: 'Daily Activity Report',   icon: 'summarize' },
    ],
    governance: [
        { val: 'class',         label: 'Class',            icon: 'category' },
        { val: 'principle',     label: 'Principle',        icon: 'lightbulb' },
        { val: 'concept',       label: 'Concept',          icon: 'psychology' },
        { val: 'divine_pattern',label: 'Divine Pattern',   icon: 'pattern' },
        { val: 'mandate',       label: 'Mandate',          icon: 'gavel' },
        { val: 'statement',     label: 'Statement',        icon: 'format_quote' },
        { val: 'framework',     label: 'Framework',        icon: 'account_tree' },
        { val: 'narrative',     label: 'Narrative',        icon: 'history_edu' },
        { val: 'protocol',      label: 'Protocol',         icon: 'rule' },
        { val: 'procedure',     label: 'Procedure',        icon: 'checklist' },
        { val: 'subject',       label: 'Subject',          icon: 'topic' },
        { val: 'entity',        label: 'Entity',           icon: 'badge' },
    ],
    activity: [
        { val: 'task',     label: 'Task',              icon: 'task_alt' },
        { val: 'project',  label: 'Project',           icon: 'folder_open' },
        { val: 'campaign', label: 'Campaign',          icon: 'campaign' },
        { val: 'event',    label: 'Event',             icon: 'event' },
        { val: 'habit',    label: 'Spiritual Habit',   icon: 'repeat' },
    ],
    community: [
        { val: 'announcement', label: 'Announcement',      icon: 'announcement' },
        { val: 'gathering',    label: 'Gathering',         icon: 'groups' },
        { val: 'report',       label: 'Pastoral Report',   icon: 'description' },
    ],
    bible: [
        { val: 'bible_note', label: 'Scripture Note', icon: 'auto_stories' },
    ],
};

const Dial = {
    currentFamily: 'journal',
    currentType:   'note',

    init() {
        // Restore from hidden fields if editing an existing record
        const family = document.getElementById('hidden-record-family')?.value || 'journal';
        const type   = document.getElementById('hidden-record-type')?.value   || 'note';
        const btn    = document.querySelector(`[data-family="${family}"]`);
        if (btn) this.setFamily(btn, family, type);
        else     this.setFamily(document.querySelector('[data-family="journal"]'), 'journal', type);
    },

    setFamily(btn, family, restoreType = null) {
        this.currentFamily = family;

        // Update family buttons
        document.querySelectorAll('#family-nav .ctx-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');

        // Render type list
        const types = DIAL_MAP[family] || [];
        const container = document.getElementById('type-nav');
        container.innerHTML = types.map((t, i) => `
            <button type="button"
                    class="ctx-btn ${i === 0 && !restoreType ? 'active' : ''}"
                    data-type="${t.val}"
                    style="flex-shrink: 0;"
                    onclick="Dial.setType(this, '${t.val}')">
                <span class="material-symbols-outlined">${t.icon}</span>
                ${t.label}
            </button>
        `).join('');

        // Select restored type or first
        const target = restoreType
            ? container.querySelector(`[data-type="${restoreType}"]`)
            : container.querySelector('.ctx-btn');
        if (target) {
            container.querySelectorAll('.ctx-btn').forEach(b => b.classList.remove('active'));
            target.classList.add('active');
            this.currentType = target.dataset.type;
        }

        this._sync(family, this.currentType);
    },

    setType(btn, type) {
        this.currentType = type;
        document.querySelectorAll('#type-nav .ctx-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        this._sync(this.currentFamily, type);
    },

    _sync(family, type) {
        const fi = document.getElementById('hidden-record-family');
        const ti = document.getElementById('hidden-record-type');
        const st = document.getElementById('save-status');
        if (fi) fi.value = family;
        if (ti) ti.value = type;
        if (st) st.textContent = family.charAt(0).toUpperCase() + family.slice(1) +
                                  ' · ' + type.replace(/_/g, ' ');

        document.body.dispatchEvent(new CustomEvent('dialChanged', {
            detail: { family, type }
        }));
    }
};

document.addEventListener('DOMContentLoaded', () => Dial.init());
document.addEventListener('htmx:afterSwap',   () => Dial.init());
</script>
