<div class="ws-list-item" id="record-{{ record.id }}"
     hx-get="{% url 'records:records-detail' record.id %}"
     hx-target="#main-stage"
     hx-push-url="true">

  <div class="ws-list-item__content">
    <div class="ws-list-item__title">{{ record.title }}</div>
    <div class="ws-list-item__meta" style="margin-top: 4px;">
      <span class="badge-unit badge--{{ record.record_type }}" style="font-size: 10px;">
        {{ record.get_record_type_display|default:record.record_type|title }}
      </span>
      <span style="opacity: 0.5; font-size: 11px; margin-left: 8px;">{{ record.updated_at|date:"d M" }}</span>
    </div>
  </div>

  <div class="ws-list-item__action" onclick="event.stopPropagation();">
    <button class="ws-btn ws-btn--secondary" style="padding: 4px;"
            hx-get="{% url 'records:htmx-edit' record.id %}"
            hx-target="#drawerInner"
            hx-swap="innerHTML"
            onclick="event.stopPropagation(); window.ICSDrawer && window.ICSDrawer.open('Edit Record')">
      <span class="material-symbols-outlined" style="font-size: 18px;">edit</span>
    </button>
  </div>
</div>
