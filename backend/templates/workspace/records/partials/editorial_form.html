{# workspace/records/partials/editorial_form.html — Full-stage record editor #}
{% load static %}

<div class="editorial-stage" id="editorial-stage">

    {# Sticky toolbar #}
    <div class="editorial-toolbar">

        <div class="editorial-toolbar__left">
            <select name="record_type" id="record-type"
                    class="editorial-type-picker"
                    onchange="document.getElementById('hidden-record-type').value = this.value">
                {% for value, label in record_types %}
                <option value="{{ value }}" {% if value == active_type %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
            <span id="save-status" class="editorial-status">Desk Ready</span>
        </div>

        <div class="editorial-toolbar__group--center">
            <button type="button" class="editorial-toolbar__btn" title="Bold"
                    onclick="EditorialUI.handleAction('bold')">
                <span class="material-symbols-outlined">format_bold</span>
            </button>
            <button type="button" class="editorial-toolbar__btn" title="Italic"
                    onclick="EditorialUI.handleAction('italic')">
                <span class="material-symbols-outlined">format_italic</span>
            </button>
            <div class="editorial-toolbar__divider"></div>
            <button type="button" class="editorial-toolbar__btn" title="Heading 1"
                    onclick="EditorialUI.handleAction('heading 1')">
                <span class="material-symbols-outlined">format_h1</span>
            </button>
            <button type="button" class="editorial-toolbar__btn" title="Heading 2"
                    onclick="EditorialUI.handleAction('heading 2')">
                <span class="material-symbols-outlined">format_h2</span>
            </button>
            <div class="editorial-toolbar__divider"></div>
            <button type="button" class="editorial-toolbar__btn" title="Quote"
                    onclick="EditorialUI.handleAction('quote')">
                <span class="material-symbols-outlined">format_quote</span>
            </button>
            <button type="button" class="editorial-toolbar__btn" title="Link"
                    onclick="EditorialUI.handleAction('link')">
                <span class="material-symbols-outlined">link</span>
            </button>
            <button type="button" class="editorial-toolbar__btn" title="Bullet List"
                    onclick="EditorialUI.handleAction('bullet')">
                <span class="material-symbols-outlined">format_list_bulleted</span>
            </button>
            <div class="editorial-toolbar__divider"></div>
            <button type="button" class="editorial-toolbar__btn" title="Preview (⌘P)"
                    id="preview-toggle" onclick="EditorialUI.togglePreview()">
                <span class="material-symbols-outlined">visibility</span>
            </button>
            <button type="button" class="editorial-toolbar__btn" title="Focus Mode (⌘⇧F)"
                    id="focus-toggle" onclick="EditorialUI.toggleFocus()">
                <span class="material-symbols-outlined">fullscreen</span>
            </button>
        </div>

        <div class="editorial-toolbar__right">
            <span class="editorial-status" id="word-count" style="min-width: 60px; text-align: right;"></span>
            <button type="submit" form="editorial-form" class="ws-topbar__cta editorial-save-btn">
                Save Record
            </button>
        </div>
    </div>

    {# Writing canvas #}
    <div class="editorial-canvas" id="editorial-canvas">
        <form id="editorial-form"
              hx-post="{% if record %}{% url 'records:htmx-edit' record.id %}{% else %}{% url 'records:htmx-create' %}{% endif %}"
              hx-target="#main-stage"
              hx-push-url="true">
            {% csrf_token %}
            <input type="hidden" name="record_type" id="hidden-record-type"
                   value="{{ active_type|default:record.record_type|default:'note' }}">

            <input type="text" name="title" id="record-title"
                   value="{{ record.title|default:'' }}"
                   placeholder="Give your record a title…"
                   class="editorial-title-input editorial-title"
                   required autofocus autocomplete="off">

            <textarea name="content" id="editorial-editor"
                      class="editorial-editor-textarea editorial-body"
                      placeholder="Begin writing… the word is alive.">{{ record.content|default:'' }}</textarea>

            <div id="editorial-preview"
                 class="editorial-preview-pane editorial-body"
                 style="display: none;"></div>
        </form>
    </div>
</div>

<script src="{% static 'js/editorial_v2.js' %}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => EditorialUI.init());
    document.addEventListener('htmx:afterSwap', () => EditorialUI.init());
</script>
