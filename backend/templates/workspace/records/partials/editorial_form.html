{# workspace/records/partials/editorial_form.html #}
{# A standalone editorial surface for the Triple-Panel Stage #}

<div class="editorial-stage">
    <form class="editorial-canvas" 
          id="editorial-form"
          hx-post="{% url 'records:htmx-create' %}"
          hx-target="#main-content"
          hx-push-url="true">
        {% csrf_token %}
        
        {# 1. Formatting Toolbar #}
        <div class="editorial-toolbar">
            <button type="button" class="editorial-toolbar__btn" title="Bold"><span class="material-symbols-outlined">format_bold</span></button>
            <button type="button" class="editorial-toolbar__btn" title="Italic"><span class="material-symbols-outlined">format_italic</span></button>
            <div class="editorial-toolbar__divider"></div>
            <button type="button" class="editorial-toolbar__btn" title="Heading 1"><span class="material-symbols-outlined">format_h1</span></button>
            <button type="button" class="editorial-toolbar__btn" title="Heading 2"><span class="material-symbols-outlined">format_h2</span></button>
            <div class="editorial-toolbar__divider"></div>
            <button type="button" class="editorial-toolbar__btn" title="Quote"><span class="material-symbols-outlined">format_quote</span></button>
            <button type="button" class="editorial-toolbar__btn" title="Link"><span class="material-symbols-outlined">link</span></button>
            
            <div style="margin-left: auto; display: flex; align-items: center; gap: var(--space-s);">
                <div id="save-status" style="font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;">Desk Ready</div>
                <button type="submit" class="ws-topbar__cta" style="padding: 0 var(--space-m);">
                    Save Record
                </button>
            </div>
        </div>

        {# 2. Title & Type #}
        <div style="margin-bottom: var(--space-m);">
            <div style="display: flex; align-items: center; gap: var(--space-s); margin-bottom: 8px;">
                <select name="record_type" id="record-type" class="ws-icon-btn" style="width: auto; padding: 0 var(--space-s); font-size: 11px;">
                    {% for value, label in record_types %}
                    <option value="{{ value }}" {% if value == active_type %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
                <span style="font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;">Draft Mode</span>
            </div>
            
            <input type="text" name="title" id="record-title" 
                   value="{{ record.title|default:'' }}"
                   placeholder="Give your record a title..." 
                   class="editorial-title" 
                   style="width: 100%; border: none; background: transparent; outline: none;" 
                   required autofocus autofill="off">
        </div>

        {# 3. The Markdown Editor #}
        <textarea name="content" id="editorial-editor" 
                  class="editorial-body" 
                  placeholder="Begin writing... The word is alive."
                  style="width: 100%; min-height: 60vh; border: none; background: transparent; outline: none; resize: none;">{{ record.content|default:'' }}</textarea>
    </form>
</div>

{# Re-init Editorial logic after HTMX swap #}
<script src="{% static 'js/editorial_v2.js' %}"></script>
<script>
    if (typeof EditorialUI !== 'undefined') {
        EditorialUI.init();
    }
</script>
