{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<style>
.tenants-surface { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }
.tenants-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.tenants-header h2 { margin: 0; font-size: 1.2rem; font-weight: 600; }
.tenant-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
.tenant-card__name { font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
.tenant-card__meta { font-size: 0.82rem; color: var(--text-secondary); }
.tenant-card__role { display: inline-block; background: var(--primary-muted, #e8f0fe); color: var(--primary); border-radius: 4px; padding: 1px 8px; font-size: 0.75rem; font-weight: 600; margin-top: 0.4rem; }
.wizard-form label { display: block; font-size: 0.88rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.25rem; margin-top: 1rem; }
.wizard-form input[type=text], .wizard-form select, .wizard-form textarea { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 0.95rem; box-sizing: border-box; }
.wizard-form textarea { resize: vertical; min-height: 80px; }
.field-error { color: var(--error, #d32f2f); font-size: 0.8rem; margin-top: 0.2rem; }
.wizard-actions { margin-top: 1.5rem; display: flex; gap: 0.75rem; align-items: center; }
.success-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.success-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 2rem; text-align: center; }
.success-card h2 { margin: 0 0 0.5rem; font-size: 1.3rem; }
.success-card p { color: var(--text-secondary); margin: 0 0 1.25rem; }
.next-steps { text-align: left; margin-top: 1.5rem; }
.next-steps h3 { font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.75rem; }
.next-step { display: flex; gap: 0.75rem; align-items: flex-start; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
.next-step:last-child { border-bottom: none; }
.next-step__num { width: 22px; height: 22px; border-radius: 50%; background: var(--primary); color: #fff; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.next-step__text { font-size: 0.9rem; color: var(--text); }
.next-step__text a { color: var(--primary); text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="tenants-surface">
  {% block tenants_content %}{% endblock %}
</div>
{% endblock %}
