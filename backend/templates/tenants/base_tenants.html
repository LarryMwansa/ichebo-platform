{% extends "workspace_shell.html" %}
{% load static %}

{% block watermark %}TENANCY{% endblock %}

{% block breadcrumb %}
    <span class="ws-topbar__breadcrumb-item">Tenancy Hub</span>
{% endblock %}

{% block ws_content %}
<div class="tenants-surface" style="padding: var(--space-l) 0;">
    {% block tenants_content %}{% endblock %}
</div>
{% endblock %}

{% block extra_css %}
<style>
    .sd-section-title { 
        font-family: var(--ff-body);
        font-size: 0.75rem; 
        font-weight: 700; 
        color: var(--muted); 
        text-transform: uppercase; 
        letter-spacing: 0.05em; 
        margin-bottom: var(--space-s); 
        margin-top: var(--space-l); 
    }
    .tenant-card { 
        background: var(--stone); 
        border: 1px solid var(--border); 
        border-radius: var(--radius-m); 
        padding: var(--space-m); 
        margin-bottom: var(--space-s); 
        transition: all var(--transition-fast);
    }
    .tenant-card--link { 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        text-decoration: none; 
        color: inherit; 
    }
    .tenant-card--link:hover { 
        border-color: var(--primary); 
        transform: translateX(4px);
    }
    .tenant-card--agency { 
        border-left: 4px solid var(--primary); 
    }
    .tenant-card__name { 
        font-family: var(--ff-body);
        font-weight: 700; 
        color: var(--text); 
        margin-bottom: 2px; 
    }
    .tenant-card__meta { 
        font-size: 0.85rem; 
        color: var(--muted); 
    }
</style>
{% endblock %}
