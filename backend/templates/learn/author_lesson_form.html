{% extends "learn/base_learn.html" %}

{% block learn_content %}
<div class="learn-header">
  <div class="label-caps" hx-get="{% url 'learn:learn-author' %}" hx-target="#main-content" hx-push-url="true" style="cursor:pointer; color:var(--primary);">
    Authorship &rsaquo;
  </div>
  <h1 class="title-small">{% if record %}Edit {{ record.record_type|title }}{% else %}Draft Content Unit{% endif %}</h1>
</div>

<form method="post" class="record-drawer-form" style="max-width: 800px; margin: 0 auto;"
      action="{% if record %}{% url 'learn:learn-author-lesson-edit' record.id %}{% else %}{% url 'learn:learn-author-lesson' %}{% endif %}">
  {% csrf_token %}

  {% if not record %}
  <div class="record-form-group">
    <label class="label-caps">Unit Type</label>
    <select name="record_type" class="form-input-touch">
      <option value="lesson">Lesson (Standard Content)</option>
      <option value="quiz">Quiz (Automated Assessment)</option>
      <option value="assignment">Assignment (Submission-based)</option>
    </select>
  </div>
  {% endif %}

  <div class="record-form-group">
    <label class="label-caps">Unit Title</label>
    <input type="text" name="title" class="form-input-touch" required maxlength="500"
           value="{{ record.title|default:'' }}" placeholder="e.g. Chapter 1: The Nature of Being">
  </div>

  <div class="record-form-group">
    <label class="label-caps">Instructional Content (Markdown)</label>
    <textarea name="content" class="form-input-touch" 
              style="min-height: 400px; font-family: 'Roboto Mono', monospace; font-size: 14px; line-height: 1.6;"
              rows="15" placeholder="Draft your lesson content using Markdown…">{{ record.content|default:'' }}</textarea>
  </div>

  {% if not record %}
  <div class="record-form-group">
    <label class="label-caps">Course Context</label>
    <select name="course_id" class="form-input-touch">
      <option value="">— Independent Content —</option>
      {% for c in courses %}
      <option value="{{ c.id }}">{{ c.title }}</option>
      {% endfor %}
    </select>
  </div>
  {% endif %}

  <div style="margin-top: 2rem;">
    <button type="submit" class="btn-touch" style="background: var(--primary); color: #fff; width: 100%; font-weight: 700;">
      {% if record %}Save Changes{% else %}Create Draft Unit{% endif %}
    </button>
  </div>
</form>
{% endblock %}
