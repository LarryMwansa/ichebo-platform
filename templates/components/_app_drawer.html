<!-- components/_app_drawer.html -->

<!-- Overlay (click to close) -->
<div id="overlay" class="overlay" aria-hidden="true"></div>

<!-- Drawer — Context Panel -->
<div id="drawer" class="drawer" role="dialog" aria-modal="true" aria-label="Options">

  <div class="drawer-header">
    <div class="drawer-title">Options</div>
    <button id="closeBtn" class="close-btn" aria-label="Close menu">&times;</button>
  </div>

  <div class="drawer-content">

    {# Default context content #}
    {% block drawer_content %}
    <div class="drawer-section">
      <a href="{% url 'profile' %}" class="drawer-link">
        <span class="material-symbols-outlined">person</span>
        My Profile
      </a>
      <a href="{% url 'settings' %}" class="drawer-link">
        <span class="material-symbols-outlined">settings</span>
        Settings
      </a>
    </div>
    {% endblock %}

    {# Secondary Apps #}
    <div class="drawer-section">
      <div class="drawer-section-label">More Apps</div>
      <div class="app-grid" id="appGrid">

        <a href="#" class="app">
          <span class="material-symbols-outlined app-icon">check_circle</span>
          <div class="app-label">Activity</div>
        </a>

        <a href="#" class="app">
          <span class="material-symbols-outlined app-icon">description</span>
          <div class="app-label">Records</div>
        </a>

        <a href="{% url 'governance:library-home' %}" class="app">
          <span class="material-symbols-outlined app-icon">gavel</span>
          <div class="app-label">Governance</div>
        </a>

        <a href="{% url 'calendar:month' %}" class="app">
          <span class="material-symbols-outlined app-icon">calendar_month</span>
          <div class="app-label">Calendar</div>
        </a>

      </div>
    </div>

  </div>

</div>
