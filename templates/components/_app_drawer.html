<!-- components/_app_drawer.html -->

<!-- Overlay (click to close) -->
<div id="overlay" class="overlay" aria-hidden="true"></div>

<!-- Drawer — Context Panel (reusable across pages) -->
<div id="drawer" class="drawer" role="dialog" aria-modal="true" aria-label="Options">

  <div class="drawer-header">
    {# Dynamic title — pages can override via context #}
    <div class="drawer-title">{% block drawer_title %}Options{% endblock %}</div>
    <button id="closeBtn" class="close-btn" aria-label="Close menu">&times;</button>
  </div>

  <div class="drawer-content">
    {# Pages/views inject their own drawer content #}
    {% block drawer_content %}
    <!-- Default empty state — pages populate this block -->
    {% endblock %}
  </div>

</div>
