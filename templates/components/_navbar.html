<!-- components/_navbar.html -->
<div class="navbar">

  <!-- LEFT: Logo -->
  <div class="nav-left">
    <a href="{% url 'dashboard:index' %}" class="logo-link">
       <div class="logo-container">🏛️ <span class="logo-text">ICS</span></div>
    </a>
  </div>

  <!-- RIGHT: Actions -->
  <div class="nav-right">

    <!-- Notifications -->
    <div class="nav-right-item">
      <a href="{% url 'notifications:list' %}" class="icon-btn" aria-label="Notifications" id="notifBtn">
        <span class="material-symbols-outlined">notifications</span>
        <span id="notif-badge" class="notif-badge"
              hx-get="{% url 'notifications-api:unread-badge' %}"
              hx-trigger="load"
              hx-swap="outerHTML"
              style="display:none;"></span>
      </a>
    </div>

    <!-- Theme Toggle -->
    <div class="nav-right-item">
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="material-symbols-outlined theme-icon-sun">light_mode</span>
        <span class="material-symbols-outlined theme-icon-moon">dark_mode</span>
      </button>
    </div>

    <!-- Profile Avatar (lightweight: Settings + Logout only) -->
    <div class="nav-right-item">
      {% if user.is_authenticated %}
      <button id="profileBtn" class="profile-avatar-btn" aria-label="Account menu">
        {% if user.avatar_url %}
          <img src="{{ user.avatar_url }}" alt="{{ user.display_name }}">
        {% else %}
          <div class="avatar-placeholder">{{ user.display_name|default:user.email|first|upper }}</div>
        {% endif %}
      </button>

      <div id="profileMenu" class="profile-menu" role="menu">
        <div class="profile-header">
          <div class="profile-avatar-large">
            {{ user.display_name|default:user.email|first|upper }}
          </div>
          <div class="profile-identity">
            <strong>{{ user.display_name|default:user.username }}</strong>
            <small>{{ user.email }}</small>
          </div>
        </div>
        <div class="profile-menu-items">
          <a href="{% url 'settings' %}" role="menuitem">
            <span class="material-symbols-outlined">settings</span> Settings
          </a>
          <form method="post" action="{% url 'logout' %}" class="logout-form">
            {% csrf_token %}
            <button type="submit" role="menuitem" class="logout-btn">
              <span class="material-symbols-outlined">logout</span> Logout
            </button>
          </form>
        </div>
      </div>
      {% else %}
      <a href="{% url 'login' %}" class="btn-touch btn-sm">Sign In</a>
      {% endif %}
    </div>

  </div>
</div>
