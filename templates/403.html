<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 — Access Denied — ICS</title>
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/global.css">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <script src="/static/js/storage.js"></script>
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      gap: 1rem;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      color: var(--warning, #e09a2b);
      opacity: 0.3;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
    }
    .error-detail {
      color: var(--text-secondary, #888);
      max-width: 28rem;
    }
    .error-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }
    .error-btn {
      padding: 0.6rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      text-decoration: none;
      background: var(--primary, #5b6afa);
      color: #fff;
    }
    .error-btn--ghost {
      background: transparent;
      border: 1px solid var(--border, #ccc);
      color: var(--text-primary, inherit);
    }
  </style>
</head>
<body class="ics-shell">
  <div class="error-page">
    <div class="error-code">403</div>
    <h1 class="error-title">Access denied</h1>
    <p class="error-detail">
      You don't have permission to access this resource.
      {% if exception %}{{ exception }}{% endif %}
    </p>
    <div class="error-actions">
      <a href="/" class="error-btn">Go home</a>
      <a href="javascript:history.back()" class="error-btn error-btn--ghost">Go back</a>
    </div>
  </div>
</body>
</html>
