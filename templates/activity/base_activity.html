{% extends "base.html" %}
{% load static %}

{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/activity.css' %}">
{% endblock %}

{% block content %}
<div class="activity-shell">

  <nav class="activity-tab-row" aria-label="Activity navigation">
    <a href="{% url 'activity:activity-home' %}"
       class="activity-tab {% if request.resolver_match.url_name == 'activity-home' %}activity-tab--active{% endif %}">
      My Activities
    </a>
  </nav>

  <div class="activity-content">
    {% block activity_content %}{% endblock %}
  </div>

</div>
{% endblock %}
