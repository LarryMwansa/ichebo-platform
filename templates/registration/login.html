{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Sign In</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn--primary" style="width: 100%;">Sign In</button>
  </form>
  <p style="text-align: center; margin-top: 15px;">No account? <a href="{% url 'register_ui' %}">Register</a></p>
</div>
{% endblock %}
