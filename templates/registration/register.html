{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Create Account</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn--primary" style="width: 100%;">Register</button>
  </form>
  <p style="text-align: center; margin-top: 15px;">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
</div>
{% endblock %}
