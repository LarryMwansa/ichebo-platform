{% extends "learn/base_learn.html" %}

{% block learn_content %}
<div class="learn-header">
  <a href="{% url 'learn:learn-author' %}" class="btn-back">← Authorship</a>
  <h2>{% if record %}Edit Course{% else %}New Course{% endif %}</h2>
</div>
<form method="post" class="author-form"
      action="{% if record %}{% url 'learn:learn-author-course-edit' record.id %}{% else %}{% url 'learn:learn-author-course' %}{% endif %}">
  {% csrf_token %}
  <label>Title
    <input type="text" name="title" required maxlength="500"
           value="{{ record.title|default:'' }}">
  </label>
  <label>Description
    <textarea name="description" rows="4">{{ record.content|default:'' }}</textarea>
  </label>
  {% if not record %}
  <label>Parent Programme
    <select name="programme_id">
      <option value="">— None —</option>
      {% for p in programmes %}
      <option value="{{ p.id }}">{{ p.title }}</option>
      {% endfor %}
    </select>
  </label>
  {% endif %}
  <button type="submit" class="btn-primary">
    {% if record %}Save Changes{% else %}Create (Draft){% endif %}
  </button>
</form>
{% endblock %}
