{% extends "learn/base_learn.html" %}

{% block learn_content %}
<div class="learn-header">
  <a href="{% url 'learn:learn-author' %}" class="btn-back">← Authorship</a>
  <h2>New Course</h2>
</div>
<form method="post" class="author-form">
  {% csrf_token %}
  <label>Title
    <input type="text" name="title" required maxlength="500">
  </label>
  <label>Description
    <textarea name="description" rows="4"></textarea>
  </label>
  <label>Parent Programme
    <select name="programme_id">
      <option value="">— None —</option>
      {% for p in programmes %}
      <option value="{{ p.id }}">{{ p.title }}</option>
      {% endfor %}
    </select>
  </label>
  <button type="submit" class="btn-primary">Create (Draft)</button>
</form>
{% endblock %}
