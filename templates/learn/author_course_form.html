{% extends "learn/base_learn.html" %}

{% block learn_content %}
<div class="learn-header">
  <div class="label-caps" hx-get="{% url 'learn:learn-author' %}" hx-target="#main-content" hx-push-url="true" style="cursor:pointer; color:var(--primary);">
    Authorship &rsaquo;
  </div>
  <h1 class="title-small">{% if record %}Edit Course{% else %}New Course{% endif %}</h1>
</div>

<form method="post" class="record-drawer-form" style="max-width: 600px; margin: 0 auto;"
      action="{% if record %}{% url 'learn:learn-author-course-edit' record.id %}{% else %}{% url 'learn:learn-author-course' %}{% endif %}">
  {% csrf_token %}

  <div class="record-form-group">
    <label class="label-caps">Course Title</label>
    <input type="text" name="title" class="form-input-touch" required maxlength="500"
           value="{{ record.title|default:'' }}" placeholder="e.g. Introduction to Systematic Theology">
  </div>

  <div class="record-form-group">
    <label class="label-caps">Course Summary</label>
    <textarea name="description" class="form-input-touch" rows="6" placeholder="Objective and scope of the course…">{{ record.content|default:'' }}</textarea>
  </div>

  {% if not record %}
  <div class="record-form-group">
    <label class="label-caps">Parent Programme Assignment</label>
    <select name="programme_id" class="form-input-touch">
      <option value="">— Independent Course —</option>
      {% for p in programmes %}
      <option value="{{ p.id }}">{{ p.title }}</option>
      {% endfor %}
    </select>
  </div>
  {% endif %}

  <div style="margin-top: 2rem; display: flex; gap: 12px;">
    <button type="submit" name="action" value="save" class="btn-touch btn-secondary" style="flex: 1;">
      {% if record %}Save Draft{% else %}Save as Draft{% endif %}
    </button>
    <button type="submit" name="action" value="submit" class="btn-touch btn-primary" style="flex: 1;">
      Submit for Review
    </button>
  </div>
</form>
{% endblock %}
