{% extends "learn/base_learn.html" %}

{% block learn_content %}
<div class="learn-header">
  <div class="label-caps" hx-get="{% url 'learn:learn-author' %}" hx-target="#main-content" hx-push-url="true" style="cursor:pointer; color:var(--primary);">
    Authorship &rsaquo;
  </div>
  <h1 class="title-small">{% if record %}Edit Programme{% else %}New Programme{% endif %}</h1>
</div>

<form method="post" class="record-drawer-form" style="max-width: 600px; margin: 0 auto;"
      action="{% if record %}{% url 'learn:learn-author-programme-edit' record.id %}{% else %}{% url 'learn:learn-author-programme' %}{% endif %}">
  {% csrf_token %}

  {% if can_create_induction %}
  <div class="record-form-group">
    <label class="label-caps">Programme Classification</label>
    <select name="programme_type" class="form-input-touch">
      <option value="programme"
        {% if record and record.record_type != 'induction' %}selected{% endif %}>
        Standard Programme
      </option>
      <option value="induction"
        {% if record and record.record_type == 'induction' %}selected{% endif %}>
        Global Induction
      </option>
    </select>
  </div>
  {% endif %}

  <div class="record-form-group">
    <label class="label-caps">Title</label>
    <input type="text" name="title" class="form-input-touch" required maxlength="500"
           value="{{ record.title|default:'' }}" placeholder="e.g. Bachelor of Divinity">
  </div>

  <div class="record-form-group">
    <label class="label-caps">Qualification Level</label>
    <select name="qualification" class="form-input-touch">
      <option value="Certificate" {% if record.metadata.qualification == 'Certificate' %}selected{% endif %}>Certificate</option>
      <option value="Diploma" {% if record.metadata.qualification == 'Diploma' %}selected{% endif %}>Diploma</option>
      <option value="Degree" {% if record.metadata.qualification == 'Degree' %}selected{% endif %}>Degree</option>
      <option value="Masters" {% if record.metadata.qualification == 'Masters' %}selected{% endif %}>Masters</option>
      <option value="Doctorate" {% if record.metadata.qualification == 'Doctorate' %}selected{% endif %}>Doctorate</option>
    </select>
  </div>

  <div class="record-form-group">
    <label class="label-caps">Vision & Scope</label>
    <textarea name="description" class="form-input-touch" rows="6" placeholder="Describe the aims of this programme…">{{ record.content|default:'' }}</textarea>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="record-form-group">
      <label class="label-caps">Duration (Years)</label>
      <input type="number" name="duration_years" class="form-input-touch" min="1" max="10"
             value="{{ record.metadata.duration_years|default:'' }}">
    </div>
    {% if not record %}
    <div class="record-form-group">
      <label class="label-caps">Required Level</label>
      <input type="number" name="required_level" class="form-input-touch" min="1" max="5" value="1">
    </div>
    {% endif %}
  </div>

  <div class="record-form-group">
    <label class="label-caps">Meta Pathways</label>
    <input type="text" name="pathways" class="form-input-touch" placeholder="e.g. Leadership, Governance"
           value="{{ record.metadata.pathways|default:'' }}">
  </div>

  <div style="margin-top: 2rem;">
    <button type="submit" class="btn-touch" style="background: var(--primary); color: #fff; width: 100%; font-weight: 700;">
      {% if record %}Save Changes{% else %}Create Draft Programme{% endif %}
    </button>
  </div>
</form>
{% endblock %}
