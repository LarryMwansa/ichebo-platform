{% extends "community/base_community.html" %}

{% block community_content %}

<div class="community-header">
  <div class="community-avatar">
    <span class="material-symbols-outlined">groups</span>
  </div>
  <div class="community-info">
    <div class="community-name">Member Directory</div>
    <div class="community-tier">Community Registry</div>
  </div>
</div>

<div class="community-search-container">
  <span class="material-symbols-outlined search-icon">search</span>
  <input type="search" placeholder="Search members…"
         name="q" value="{{ search_q }}"
         hx-get="{% url 'community:htmx-member-search' %}"
         hx-trigger="keyup changed delay:400ms"
         hx-target="#member-list"
         hx-swap="innerHTML"
         class="form-input-touch community-search-input">
</div>

<!-- Filters -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px;">
  <select name="level"
          hx-get="{% url 'community:htmx-member-search' %}"
          hx-trigger="change"
          hx-target="#member-list"
          hx-swap="innerHTML"
          hx-include="[name='q'],[name='order']"
          class="form-input-touch">
    <option value="">All Levels</option>
    {% for val, label in level_choices %}
    <option value="{{ val }}" {% if filter_level == val|stringformat:"s" %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>

  <select name="order"
          hx-get="{% url 'community:htmx-member-search' %}"
          hx-trigger="change"
          hx-target="#member-list"
          hx-swap="innerHTML"
          hx-include="[name='q'],[name='level']"
          class="form-input-touch">
    <option value="">All Orders</option>
    {% for val, label in order_choices %}
    <option value="{{ val }}" {% if filter_order == val %}selected{% endif %}>{{ val }}</option>
    {% endfor %}
  </select>
</div>

<div id="member-list" class="list-group">
  {% include "community/partials/member_list.html" %}
</div>
{% endblock %}
