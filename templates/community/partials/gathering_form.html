<div class="record-drawer-form" id="gathering-form">
  <div class="record-form-group">
    <label class="label-caps">Gathering Title</label>
    <input type="text" name="title" class="form-input-touch" placeholder="e.g. Sunday Morning Service" required>
  </div>
  
  <div class="record-form-group">
    <label class="label-caps">Date & Time</label>
    <input type="datetime-local" name="scheduled_at" class="form-input-touch" required>
  </div>
  
  <div class="record-form-group">
    <label class="label-caps">Delivery Format</label>
    <select name="format" class="form-input-touch"
            onchange="
              const fmt = this.value;
              document.getElementById('loc-field').style.display = (fmt !== 'digital' ? 'block' : 'none');
              document.getElementById('stream-field').style.display = (fmt !== 'in_person' ? 'block' : 'none');
            ">
      <option value="in_person">In Person</option>
      <option value="digital">Digital (Online Only)</option>
      <option value="hybrid">Hybrid (Both)</option>
    </select>
  </div>

  <div class="record-form-group" id="loc-field">
    <label class="label-caps">Location / Venue</label>
    <input type="text" name="location" class="form-input-touch" placeholder="Physical address or venue name">
  </div>

  <div class="record-form-group" id="stream-field" style="display: none;">
    <label class="label-caps">Stream Link</label>
    <input type="url" name="stream_url" class="form-input-touch" placeholder="https://youtube.com/live/…">
  </div>

  <div class="record-form-group">
    <label class="label-caps">Additional Notes</label>
    <textarea name="description" class="form-input-touch" rows="3" placeholder="Bullet points or agenda…"></textarea>
  </div>

  <div style="margin-top: var(--space-m);">
    <button class="btn-touch" style="background: var(--primary); color: #fff; width: 100%; font-weight: 700;"
            hx-post="{% url 'community:htmx-create-gathering' %}"
            hx-target="#gathering-form-slot"
            hx-swap="innerHTML"
            hx-include="#gathering-form">
      Publish Gathering
    </button>
  </div>
</div>
