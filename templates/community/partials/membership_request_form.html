<!-- community/partials/membership_request_form.html -->
<!-- Phase 1: tenant picker — selecting a community triggers orientation check -->
<div class="membership-request-form" id="membership-request-form">
  <div class="section-heading">Select a Community</div>

  {% if tenants %}
  <div class="form-field">
    <label for="tenant-select">Community</label>
    <select id="tenant-select" name="tenant_id"
            hx-get="{% url 'community:htmx-orientation-check' %}"
            hx-target="#orientation-check-area"
            hx-swap="innerHTML"
            hx-trigger="change"
            hx-include="[name='tenant_id']">
      <option value="">— Choose a community —</option>
      {% for tenant in tenants %}
      <option value="{{ tenant.id }}">{{ tenant.name }}
        {% if tenant.tier != 'church_node' %}({{ tenant.get_tier_display }}){% endif %}
      </option>
      {% endfor %}
    </select>
  </div>
  {% else %}
  <p class="dash-empty">No active communities found.</p>
  {% endif %}
</div>
