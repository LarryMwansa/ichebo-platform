{% extends "base.html" %}
{% load static %}

{% block title %}Notifications{% endblock %}

{% block content %}
<div style="max-width:640px;margin:0 auto;padding:1.25rem 1rem 5rem;">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <h1 style="font-size:1.125rem;font-weight:700;">Notifications</h1>
    {% if unread_count %}
    <span class="gathering-format format-in_person" style="font-size:0.8rem;">
      {{ unread_count }} unread
    </span>
    {% endif %}
  </div>

  {% include "notifications/_notification_list.html" %}

</div>
{% endblock %}
