{% extends "bible/base_bible_minimal.html" %}

{% block title %}Search Bible{% endblock %}

{% block content %}
<div class="bible-search-shell">

  {# Header with back button #}
  <div class="bible-search-header" style="display:flex; align-items:center; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--card);">
    <a href="/bible/" class="btn-touch bible-search-back" aria-label="Back">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <h1 style="flex:1; margin:0; font-size:1.1rem; text-align:center;">Search Bible</h1>
    <div style="width: 48px;"></div>
  </div>

  {# Search input (sticky) #}
  <div class="bible-search-input-wrapper" style="padding: 1rem; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50;">
    <input type="text"
           class="form-input-touch"
           id="bible-search-input"
           placeholder="Search for verses..."
           autocomplete="off"
           hx-get="{% url 'bible:htmx-search' %}"
           hx-trigger="keyup delay:300ms, search"
           hx-target="#bible-search-results"
           hx-swap="innerHTML"
           hx-include="#bible-search-input">
  </div>

  {# Results container (populated by HTMX) #}
  <div class="bible-search-results" id="bible-search-results" style="flex:1; overflow-y:auto;">
    <div class="bible-search-empty" style="padding: 4rem 2rem; text-align:center; color: var(--muted);">
      <span class="material-symbols-outlined" style="font-size: 3rem; opacity: 0.3;">search</span>
      <p style="margin-top: 1rem;">Enter a keyword to search scripture</p>
    </div>
  </div>

</div>
{% endblock %}
