{# Search results partial (populated by HTMX) #}

{% if results %}
<div class="list-group">
  {% for verse in results %}
  <a href="{% url 'bible:reader-chapter' verse.book.code verse.chapter %}" class="list-item" style="text-decoration:none;">
    <div class="list-item__icon" style="background: var(--bg);">
      <span class="material-symbols-outlined">menu_book</span>
    </div>
    <div class="list-item__content">
      <div class="list-item__title" style="color: var(--primary);">{{ verse.book.name }} {{ verse.chapter }}:{{ verse.verse }}</div>
      <div class="list-item__meta" style="color: var(--text); font-size: 0.85rem; line-height: 1.4; margin-top: 4px;">{{ verse.text|truncatewords:20 }}</div>
    </div>
    <div class="list-item__action">
      <span class="material-symbols-outlined">chevron_right</span>
    </div>
  </a>
  {% endfor %}
</div>
{% elif query %}
<div class="bible-search-no-results" style="padding: 4rem 2rem; text-align:center; color: var(--muted);">
  <p>No matches found for "{{ query }}"</p>
</div>
{% endif %}
