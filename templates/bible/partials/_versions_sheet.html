<div id="drawerTitle" hx-swap-oob="innerHTML">Select Version</div>
<div id="drawerActions" hx-swap-oob="innerHTML"></div>

<div class="bible-versions-sheet" style="height: 60vh; display: flex; flex-direction: column; margin: -20px;">
  <div style="padding: 0 1rem 1rem; flex: 1; overflow-y: auto;">
    {% for language, lang_versions in versions_by_language.items %}
    <div style="margin-top: 1.5rem;">
      <div style="padding: 0 1rem 0.5rem; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em;">{{ language }}</div>
      <div class="list-group">
        {% for ver in lang_versions %}
        <button class="list-item" 
                hx-post="{% url 'bible:htmx-set-translation' %}"
                hx-vals='{"translation_code": "{{ ver.code }}"}'
                hx-target="#bible-chapter"
                hx-swap="innerHTML"
                onclick="window.ICSDrawer.close()"
                style="width: 100%; border:none; text-align:left; background: transparent; padding: 12px 1rem;">
          <div class="list-item__content">
            <div class="list-item__title" style="color: {% if ver == current_translation %}var(--primary){% else %}var(--text){% endif %}; font-weight: {% if ver == current_translation %}700{% else %}500{% endif %};">{{ ver.name }}</div>
            <div class="list-item__meta" style="font-size: 0.75rem;">{{ ver.code }}</div>
          </div>
          {% if ver == current_translation %}
          <div class="list-item__action"><span class="material-symbols-outlined" style="color: var(--primary);">check_circle</span></div>
          {% endif %}
        </button>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>

  <div style="padding: 1rem; border-top: 1px solid var(--border); background: var(--card);">
    <button class="btn-touch" 
            hx-get="{% url 'bible:languages' %}" 
            hx-target="#drawer .drawer-content"
            onclick="document.querySelector('.drawer-title').textContent = 'Select Language'"
            style="width: 100%; background: var(--bg); color: var(--primary); border: 1px solid var(--border); border-radius: 8px;">
      Change Language
    </button>
  </div>
</div>
