<div id="drawerBack" hx-swap-oob="innerHTML">
  <button hx-get="{% url 'bible:versions' %}" 
          hx-target="#drawerContent" 
          hx-swap="innerHTML"
          class="btn-touch" 
          style="border:none; background:transparent; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; color: var(--primary);">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>
</div>
<div id="drawerTitle" hx-swap-oob="innerHTML">Select Language</div>
<div id="drawerActions" hx-swap-oob="innerHTML"></div>

<div class="bible-languages-sheet" style="height: 60vh; overflow-y: auto; margin: -20px;">
  <div class="list-group" style="border:none; border-radius: 0;">
    {% for lang in languages %}
    <button class="list-item"
            hx-get="{% url 'bible:versions' %}?lang={{ lang.short_code }}"
            hx-target="#drawerContent"
            style="width: 100%; border:none; text-align:left; background: transparent;">
      <div class="list-item__content">
        <div class="list-item__title">{{ lang.name }}</div>
        <div class="list-item__meta">{{ lang.count }} version{{ lang.count|pluralize }}</div>
      </div>
      <div class="list-item__action"><span class="material-symbols-outlined">chevron_right</span></div>
    </button>
    {% endfor %}
  </div>
</div>
