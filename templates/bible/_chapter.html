<!-- Chapter header -->
<div class="bible-chapter-header" style="padding: 1.5rem 1rem 1rem;">
  <h1 class="bible-chapter-title" style="margin:0; font-size: 1.5rem; font-weight: 700; color: var(--text);">{{ book.name }} {{ chapter }}</h1>
</div>

<div class="bible-verse-list" data-book-code="{{ book.code }}" data-chapter="{{ chapter }}" style="display: flex; flex-direction: column; gap: 4px; padding-bottom: 2rem;">
  {% for verse in verses %}
  <div class="bible-verse {% if verse.verse in personal_noted %}bible-verse--personal{% endif %} {% if verse.verse in tenant_noted %}bible-verse--tenant{% endif %}"
       hx-get="{% url 'bible:htmx-annotation-panel' verse.id %}"
       hx-target="#drawer .drawer-content"
       hx-swap="innerHTML"
       role="button"
       tabindex="0"
       aria-label="{{ book.name }} {{ chapter }}:{{ verse.verse }}"
       style="display: flex; gap: 12px; padding: 12px 1rem; cursor: pointer; border-radius: 8px; transition: background 0.2s ease; position: relative;">
    
    <span class="bible-verse__num" style="font-size: 0.75rem; font-weight: 700; color: var(--primary); min-width: 1.5rem; text-align: right; padding-top: 4px; flex-shrink: 0;">{{ verse.verse }}</span>
    
    <span class="bible-verse__text" style="font-size: 1.05rem; line-height: 1.7; color: var(--text); flex: 1;">{{ verse.text }}</span>
    
    <div class="bible-verse__indicators" style="display: flex; flex-direction: column; gap: 4px; justify-content: center;">
      {% if verse.verse in personal_noted %}
      <div style="width: 6px; height: 6px; border-radius: 50%; background: var(--primary);" title="Your note"></div>
      {% endif %}
      {% if verse.verse in tenant_noted %}
      <div style="width: 6px; height: 6px; border-radius: 50%; background: var(--info);" title="Community note"></div>
      {% endif %}
    </div>
  </div>
  {% empty %}
  <div style="padding: 4rem 2rem; text-align:center; color: var(--muted);">
    <span class="material-symbols-outlined" style="font-size: 3rem; opacity: 0.3;">error</span>
    <p style="margin-top: 1rem;">Chapter content not available.</p>
  </div>
  {% endfor %}
</div>
