<!-- _display_name_show.html — read state for display name (HTMX target) -->
<div class="display-name-row">
  <span class="profile-row-value">{{ profile_user.display_name|default:"—" }}</span>
  <button class="profile-row-action"
          aria-label="Edit display name"
          hx-get="{% url 'htmx-display-name' %}"
          hx-target="#display-name-field"
          hx-swap="innerHTML">✏️</button>
</div>
