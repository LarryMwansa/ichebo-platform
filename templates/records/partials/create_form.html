<form class="record-create-form"
      hx-post="{% url 'records:htmx-create' %}"
      hx-target="#record-list, #dash-recent-list"
      hx-swap="afterbegin"
      hx-on::after-request="this.reset()">
  {% csrf_token %}
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/records.css' %}?v=3">

  <div class="form-row">
    <select name="record_type" class="form-input">
      {% for value, label in record_types %}
      <option value="{{ value }}" {% if value == active_type %}selected{% endif %}>
        {{ label }}
      </option>
      {% endfor %}
    </select>
    <input type="text" name="title" placeholder="Entry title…"
           class="form-input form-input--grow" required>
  </div>

  <div class="form-row">
    <textarea name="content" placeholder="Write your entry…"
              class="form-input form-input--textarea" rows="4"></textarea>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn-primary">Save</button>
    <button type="button" class="btn-secondary"
            onclick="this.closest('form').remove()">
      Cancel
    </button>
  </div>
</form>
