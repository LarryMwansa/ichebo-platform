<div class="list-item" id="record-{{ record.id }}" 
     hx-swap-oob="afterbegin:#record-list"
     hx-get="{% url 'records:records-detail' record.id %}" 
     hx-target="#main-content" 
     hx-push-url="true"
     style="cursor: pointer;">
  
  <div class="list-item__content">
    <div class="list-item__title">{{ record.title }}</div>
    {% if record.content %}
      <div class="list-item__meta" style="margin-top: 4px; line-height: 1.4;">
        {{ record.content|truncatechars:120 }}
      </div>
    {% endif %}
    <div class="list-item__meta" style="margin-top: 8px;">
      <span class="badge-unit badge--{{ record.record_type }}">
        {{ record.get_record_type_display|default:record.record_type|title }}
      </span>
      <span class="badge-unit" style="background: var(--hover); color: var(--muted);">
        {{ record.updated_at|date:"d M Y" }}
      </span>
    </div>
  </div>

  <div class="list-item__action" onclick="event.stopPropagation();">
    <button class="btn-touch" style="padding: 8px;"
            hx-get="{% url 'records:htmx-edit' record.id %}"
            hx-target="#drawerContent"
            hx-swap="innerHTML"
            onclick="window.ICSDrawer.open('Edit Journal Entry')">
      <span class="material-symbols-outlined">edit</span>
    </button>
  </div>
</div>
