<div class="record-card" id="record-{{ record.id }}">
  <div class="record-card-body">
    <span class="record-type-tag record-type-tag--{{ record.record_type }}">
      {{ record.record_type|title }}
    </span>
    <a href="{% url 'records:records-detail' record.id %}" class="record-title">
      {{ record.title }}
    </a>
    <span class="record-date">{{ record.updated_at|date:"d M Y" }}</span>
    {% if record.content %}
    <p class="record-excerpt">{{ record.content|truncatechars:120 }}</p>
    {% endif %}
  </div>
  <div class="record-card-actions">
    <button class="btn-sm btn-secondary"
            hx-get="{% url 'records:htmx-edit' record.id %}"
            hx-target="#record-{{ record.id }}"
            hx-swap="outerHTML">
      Edit
    </button>
    <button class="btn-sm btn-danger"
            hx-post="{% url 'records:htmx-delete' record.id %}"
            hx-target="#record-{{ record.id }}"
            hx-swap="outerHTML"
            hx-confirm="Delete this entry?"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
      Delete
    </button>
  </div>
</div>
