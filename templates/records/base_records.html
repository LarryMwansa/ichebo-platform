{% extends "base.html" %}
{% load static %}

{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/records.css' %}?v=2">
{% endblock %}

{% block content %}
<div class="records-shell">

  <nav class="records-tab-row" aria-label="Records navigation">
    <a href="{% url 'records:records-home' %}"
       class="records-tab {% if request.resolver_match.url_name == 'records-home' %}records-tab--active{% endif %}">
      My Journal
    </a>
  </nav>

  <div class="records-content">
    {% block records_content %}{% endblock %}
  </div>

</div>
{% endblock %}
