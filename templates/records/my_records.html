{% extends "records/base_records.html" %}

{% block nav_left %}
  <div class="nav-left" id="nav-left-content" hx-swap-oob="true">
    <a href="{% url 'dashboard:index' %}" class="logo-link">
       <div class="logo-container">🏛️ <span class="logo-text">ICS</span></div>
    </a>
  </div>
{% endblock %}

{% block records_content %}

<div class="records-header">
  <h1 class="explore-title">My Journal</h1>
  <p class="explore-subtitle">Prayers, reflections & spiritual notes</p>
</div>

<nav class="accounts-tab-row" style="margin: 0 -1rem 2rem; border-top: 1px solid var(--border);">
  <a href="{% url 'records:records-home' %}"
     class="accounts-tab {% if not active_type %}accounts-tab--active{% endif %}">
    All
  </a>
  {% for value, label in record_types %}
  <a href="{% url 'records:records-home' %}?type={{ value }}"
     class="accounts-tab {% if active_type == value %}accounts-tab--active{% endif %}">
    {{ label }}
  </a>
  {% endfor %}
</nav>

<!-- Record list container -->
<div id="record-list">
  {% include "records/partials/record_list.html" %}
</div>

{% endblock %}
