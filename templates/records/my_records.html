{% extends "records/base_records.html" %}

{% block nav_left %}
  <div class="nav-left" id="nav-left-content" hx-swap-oob="true">
    <a href="{% url 'dashboard:index' %}" class="logo-link">
       <div class="logo-container">🏛️ <span class="logo-text">ICS</span></div>
    </a>
  </div>
{% endblock %}

{% block records_content %}

<div class="records-header">
  <div class="label-caps" style="color: var(--primary);">My Journal</div>
  
  <div class="journal-type-grid">
    <a href="?full=1" 
       hx-get="{% url 'records:records-home' %}" 
       hx-target="#record-list" 
       hx-push-url="true"
       class="journal-type-pill {% if not active_type %}active{% endif %}">
       All
    </a>
    {% for value, label in record_types %}
    <a href="?type={{ value }}&full=1" 
       hx-get="{% url 'records:records-home' %}?type={{ value }}" 
       hx-target="#record-list" 
       hx-push-url="true"
       class="journal-type-pill {% if active_type == value %}active{% endif %}">
       {{ label }}
    </a>
    {% endfor %}
  </div>
</div>


<!-- Record list container -->
<div id="record-list">
  {% include "records/partials/record_list.html" %}
</div>

{% endblock %}
