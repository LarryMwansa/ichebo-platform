<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="var(--color-primary)" />
  <title>Bible — ICS</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/bible.css" />
</head>
<body class="app-shell">

  <!-- ═══════════════════════════════════════════════════════════
       TOP NAV BAR
  ════════════════════════════════════════════════════════════ -->
  <header class="navbar" role="banner">
    <div class="navbar__left">
      <button
        class="navbar__icon-btn"
        id="bible-open-nav"
        aria-label="Open book and chapter navigator"
        aria-haspopup="dialog"
        aria-controls="bible-navigator"
      >
        <!-- Book icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </button>
    </div>

    <div class="navbar__center">
      <h1 class="navbar__title" id="bible-reader-heading" aria-live="polite">Bible</h1>
    </div>

    <div class="navbar__right">
      <!-- Placeholder for future search -->
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════════
       ERROR BANNER (hidden by default)
  ════════════════════════════════════════════════════════════ -->
  <div
    id="bible-error-msg"
    class="bible-error-banner"
    role="alert"
    hidden
  ></div>

  <!-- ═══════════════════════════════════════════════════════════
       PANEL 1 — BOOK / CHAPTER NAVIGATOR (slide-up sheet)
  ════════════════════════════════════════════════════════════ -->
  <div
    id="bible-nav-overlay"
    class="sheet-overlay"
    aria-hidden="true"
  ></div>

  <div
    id="bible-navigator"
    class="sheet bible-navigator"
    role="dialog"
    aria-modal="true"
    aria-label="Book and chapter navigator"
  >
    <div class="sheet__header">
      <span class="sheet__title">Select Passage</span>
      <button
        id="bible-close-nav"
        class="sheet__close-btn"
        aria-label="Close navigator"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="bible-navigator__body">
      <!-- Book list (left column) -->
      <div class="bible-navigator__books-col">
        <p class="bible-navigator__col-label">Book</p>
        <ul id="bible-nav-books" class="bible-nav__book-list" role="list"></ul>
      </div>

      <!-- Chapter grid (right column) -->
      <div class="bible-navigator__chapters-col">
        <p class="bible-navigator__col-label">Chapter</p>
        <div id="bible-nav-chapters" class="bible-nav__chapter-grid"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       PANEL 2 — READER VIEW (main content)
  ════════════════════════════════════════════════════════════ -->
  <main class="app-content bible-reader" id="bible-reader-main">

    <!-- Verse list -->
    <div
      id="bible-reader-content"
      class="bible-reader__verses"
      role="list"
      aria-label="Scripture verses"
    >
      <!-- Rendered by bible-app.js -->
      <div class="bible-reader__loading" aria-live="polite">
        Loading scripture…
      </div>
    </div>

    <!-- Chapter navigation (prev / next) -->
    <nav class="bible-chapter-nav" aria-label="Chapter navigation">
      <button
        id="bible-prev-chapter"
        class="bible-chapter-nav__btn"
        aria-label="Previous chapter"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Prev</span>
      </button>

      <button
        id="bible-next-chapter"
        class="bible-chapter-nav__btn"
        aria-label="Next chapter"
      >
        <span>Next</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </nav>

  </main>

  <!-- ═══════════════════════════════════════════════════════════
       PANEL 3 — ANNOTATION PANEL (slide-up sheet, per verse)
  ════════════════════════════════════════════════════════════ -->
  <div
    id="bible-annotation-overlay"
    class="sheet-overlay"
    aria-hidden="true"
  ></div>

  <div
    id="bible-annotation-panel"
    class="sheet bible-annotation-panel"
    role="dialog"
    aria-modal="true"
    aria-label="Verse note"
  >
    <div class="sheet__header">
      <span id="bible-annotation-ref" class="sheet__title"></span>
      <button
        id="bible-annotation-close"
        class="sheet__close-btn"
        aria-label="Close note panel"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="bible-annotation-panel__body">

      <!-- Selected verse text (read-only reference) -->
      <blockquote
        id="bible-annotation-versetext"
        class="bible-annotation-panel__verse"
        aria-label="Selected verse"
      ></blockquote>

      <!-- Sign-in prompt (shown only for unauthenticated users) -->
      <div
        id="bible-signin-prompt"
        class="bible-annotation-panel__signin-prompt"
        role="status"
        aria-live="polite"
        hidden
      >
        <p>Sign in to save notes to this verse.</p>
        <a href="/login.html" class="btn btn--secondary btn--sm">Sign in</a>
      </div>

      <!-- Note textarea -->
      <label for="bible-annotation-textarea" class="bible-annotation-panel__label">
        Your note
      </label>
      <textarea
        id="bible-annotation-textarea"
        class="bible-annotation-panel__textarea"
        placeholder="Write a reflection, cross-reference, or personal note…"
        rows="5"
        maxlength="2000"
        aria-describedby="bible-annotation-ref"
      ></textarea>

      <!-- Save button -->
      <button
        id="bible-annotation-save"
        class="btn btn--primary bible-annotation-panel__save-btn"
        data-note-id=""
      >
        Save Note
      </button>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       BOTTOM NAV (shared component)
  ════════════════════════════════════════════════════════════ -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <a href="/dashboard.html" class="bottom-nav__item" aria-label="Dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>Dashboard</span>
    </a>
    <a href="/records.html" class="bottom-nav__item" aria-label="Records">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span>Records</span>
    </a>
    <a href="/bible.html" class="bottom-nav__item bottom-nav__item--active" aria-current="page" aria-label="Bible">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span>Bible</span>
    </a>
    <a href="/community.html" class="bottom-nav__item" aria-label="Community">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Community</span>
    </a>
    <a href="/learn.html" class="bottom-nav__item" aria-label="Learn">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 0 3-3h7z"/>
      </svg>
      <span>Learn</span>
    </a>
  </nav>

  <!-- ═══════════════════════════════════════════════════════════
       SCRIPTS — load order matches data contract §6.3
  ════════════════════════════════════════════════════════════ -->
  <script src="/assets/js/core/storage.js"></script>
  <script src="/assets/js/engines/identity.service.js"></script>
  <script src="/assets/js/engines/tenant.service.js"></script>
  <script src="/assets/js/engines/records.service.js"></script>
  <script src="/assets/js/engines/records.store.js"></script>
  <script src="/assets/js/engines/relationships.service.js"></script>
  <script src="/assets/js/engines/activity.service.js"></script>
  <script src="/assets/js/engines/activity.store.js"></script>
  <script src="/assets/js/engines/paraclete.service.js"></script>
  <script src="/assets/js/core/auth.js"></script>
  <script src="/assets/js/core/router.js"></script>
  <script src="/assets/js/core/main.js"></script>
  <!-- Bible app — loaded last, per-page only -->
  <script src="/assets/js/apps/bible-app.js"></script>

</body>
</html>
