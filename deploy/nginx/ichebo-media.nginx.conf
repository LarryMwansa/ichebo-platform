# Nginx configuration for the Ichebo Media VPS
# Deploy to: /etc/nginx/sites-available/ichebo-media
# Enable: ln -s /etc/nginx/sites-available/ichebo-media /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: systemctl reload nginx
#
# This config covers three concerns:
#   1. Reverse proxy to the Go Video Engine (mediad) on port 8090
#   2. Reverse proxy to MediaMTX HLS output on port 8888
#   3. Critical no-cache headers for live HLS manifests (.m3u8 files)
#
# Domain assumption: media.ichebo.org (Video Engine API + RTMP)
#                    cdn.ichebo.org   (HLS delivery — or use Hetzner Object Storage directly)

# ── Video Engine API ──────────────────────────────────────────────────────────
server {
    listen 80;
    server_name media.ichebo.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name media.ichebo.org;

    ssl_certificate     /etc/letsencrypt/live/media.ichebo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.ichebo.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # File upload — chunk size up to 512MB
    client_max_body_size 512M;
    client_body_timeout  300s;

    # Go Video Engine (mediad)
    location /engine/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8090/health;
    }
}

# ── HLS delivery (live streams) ───────────────────────────────────────────────
# If you are serving HLS directly from Nginx → MediaMTX (rather than via
# Hetzner Object Storage), use this server block.
# If HLS is served via Object Storage + CDN, configure no-cache at the CDN level
# using the rules in the hetzner-object-storage-cache-rules.txt file below.

server {
    listen 80;
    server_name cdn.ichebo.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cdn.ichebo.org;

    ssl_certificate     /etc/letsencrypt/live/cdn.ichebo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.ichebo.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # CORS — Flutter web player and other origins
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range" always;

    # ── CRITICAL: HLS manifest no-cache rules ─────────────────────────────────
    # Live HLS manifests (.m3u8) MUST NOT be cached — every request must return
    # the latest playlist with new segment URLs. If a stale manifest is served,
    # the player stops receiving new segments and the stream appears frozen.
    #
    # VOD manifests (.m3u8 for archived/transcoded videos) CAN be cached — they
    # never change. Distinguish by path: /live/* is live, /videos/* is VOD.

    # Live manifests — no cache
    location ~* ^/live/.*\.m3u8$ {
        proxy_pass           http://127.0.0.1:8888;
        proxy_http_version   1.1;
        proxy_set_header     Host $host;

        # These four headers together prevent every layer of caching.
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma       "no-cache" always;
        add_header Expires      "0" always;
        add_header Surrogate-Control "no-store" always;  # CDN layer (Cloudflare/Fastly)

        # CORS (repeated here — location blocks override server-level headers)
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    }

    # Live TS segments — short cache (2s) is fine; segments are immutable once written
    location ~* ^/live/.*\.ts$ {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        add_header Cache-Control "public, max-age=2" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Live fMP4 parts (LL-HLS) — no cache on init segments, short cache on parts
    location ~* ^/live/.*\.mp4$ {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        add_header Cache-Control "public, max-age=2" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # VOD manifests (transcoded videos) — cache for 1 hour, they never change
    location ~* ^/videos/.*\.m3u8$ {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        add_header Cache-Control "public, max-age=3600, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # VOD segments — cache for 30 days, immutable
    location ~* ^/videos/.*\.ts$ {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Everything else — pass through with default caching
    location / {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }
}
