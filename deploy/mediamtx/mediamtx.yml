# MediaMTX configuration for Ichebo Media — Live Streaming
#
# Deploy to: /etc/mediamtx/mediamtx.yml on the Video Engine VPS
# Start with: systemctl start mediamtx
#
# This VPS is separate from the Django VPS — dedicated to RTMP ingest + FFmpeg.
# Minimum spec: Hetzner CX32 (4 vCPU, 8 GB RAM)
#
# Environment variables to set in /etc/mediamtx/mediamtx.env (loaded by systemd):
#   DJANGO_WEBHOOK_URL   — https://app.ichebo.org
#   MEDIA_ENGINE_URL     — http://localhost:8090 (if co-located) or internal IP
#   MEDIA_ENGINE_API_KEY — shared secret matching Django MEDIA_ENGINE_API_KEY
#   S3_ENDPOINT          — https://fsn1.your-objectstorage.com
#   S3_BUCKET            — ichebo-delivery
#   S3_ACCESS_KEY        — from Hetzner Object Storage
#   S3_SECRET_KEY        — from Hetzner Object Storage
#   CDN_BASE_URL         — https://cdn.ichebo.org  (or your delivery bucket public URL)

# ── Server ────────────────────────────────────────────────────────────────────

logLevel: info
logDestinations: [stdout]

# API — used by the Go Video Engine to query active streams (optional).
api: yes
apiAddress: 127.0.0.1:9997

# Metrics (Prometheus) — optional, useful for monitoring.
metrics: no

# ── RTMP ingest ──────────────────────────────────────────────────────────────
# Broadcasters point OBS (or any RTMP client) to:
#   rtmp://media.ichebo.org/live/{stream_key}
# The stream key is generated by Django when a broadcast is scheduled.

rtmp: yes
rtmpAddress: :1935
# Disable anonymous publishing — stream key validation is done via on-publish hook.
rtmpEncryption: no

# ── HLS delivery ─────────────────────────────────────────────────────────────
# HLS segments are written to a local path and optionally pushed to Object Storage.
# Flutter players consume the HLS playlist at:
#   https://cdn.ichebo.org/live/{stream_key}/index.m3u8

hls: yes
hlsAddress: :8888
hlsAlwaysRemux: no
hlsVariant: lowLatency       # Low-latency HLS (LL-HLS) for sub-3s viewer latency
hlsSegmentCount: 7           # Number of segments to keep in the live playlist
hlsSegmentDuration: 2s       # 2-second segments — balanced latency vs. compatibility
hlsPartDuration: 200ms       # LL-HLS part duration
hlsSegmentMaxSize: 50MB
hlsAllowOrigin: "*"          # CORS — Flutter web player and CDN origin pull

# ── DVR (2-hour rolling buffer) ───────────────────────────────────────────────
# Viewers who join late can seek back up to 2 hours in the live stream.
# DVR recordings are stored locally; the Go engine archives them on stream end.

record: yes
recordPath: /var/lib/mediamtx/recordings/%p/%Y-%m-%dT%H-%M-%S%z
recordFormat: fmp4           # fMP4 is required for LL-HLS + seek compatibility
recordSegmentDuration: 1h
recordDeleteAfter: 3h        # Keep 3 hours on disk; Go engine archives before deletion

# ── Path defaults — applied to all streams ───────────────────────────────────

pathDefaults:
  # Source — RTMP publisher (OBS or any RTMP client)
  source: publisher

  # on-publish: called when a broadcaster starts streaming.
  # Notifies the Go Video Engine which notifies Django.
  # The Go engine registers the session and fires community notifications.
  runOnPublish: >
    curl -s -X POST http://localhost:8090/engine/stream/start
    -H "Content-Type: application/json"
    -H "Authorization: Bearer $MEDIA_ENGINE_API_KEY"
    -d "{\"stream_key\":\"$MTX_PATH\",\"record_id\":\"\",\"tenant_id\":\"\",\"hls_base_url\":\"$CDN_BASE_URL/live\"}"
  runOnPublishRestart: no

  # on-publish-done: called when the broadcaster disconnects.
  # Triggers DVR archive compilation in the Go Video Engine.
  runOnUnpublish: >
    curl -s -X POST http://localhost:8090/engine/stream/end
    -H "Content-Type: application/json"
    -H "Authorization: Bearer $MEDIA_ENGINE_API_KEY"
    -d "{\"stream_key\":\"$MTX_PATH\"}"

  # on-read: called when a viewer starts watching.
  # Optional — can be used for viewer analytics.
  # runOnRead: ""

# ── Paths — one entry per stream key pattern ─────────────────────────────────
# No static entries needed — any stream key is accepted under /live/*.
# Stream key validation is handled by the Go Video Engine via the on-publish hook.
# If you want MediaMTX itself to reject unknown keys, replace the path pattern
# with a webhook that checks the key against Django.

paths:
  "~^live/":
    # Accept any stream key under /live/
    # The Go engine validates the key against Django's BroadcastSchedule table.
    record: yes
